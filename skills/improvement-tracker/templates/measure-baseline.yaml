# ============================================================================
# MeasureBaseline 模板 — improvement-tracker Skill
# ============================================================================
#
# 用途：记录已批准 CA/PA 提案在执行后的措施基线，包含版本、范围、审批证据、
#        实施证据、有效性证据和观察窗。支撑 HLD REV-03 七项可信治理契约中的
#        MeasureBaseline 契约。
#
# 核心规则：
#   - reviewer 是唯一状态变更者：系统只产出 proposed_status/refresh_hint
#   - 无基线 = needs-baseline（不判失效）
#   - 不自动创建基线、不自动改 status
#
# 文件所有权：FEAT-RA-TRACKING（独占）
# 创建者：ST-RA-06.3-TRACK
# ============================================================================

# ── Schema 定义 ─────────────────────────────────────────────────────────────

baseline_id:
  type: string
  required: true
  immutable: true
  pattern: "BASELINE-{proposal_id}-{version}"
  description: 唯一基线标识。格式为 BASELINE-{proposal_id}-{version}，生成后不可修改

proposal_ref:
  type: string
  required: true
  description: 关联的 CA/PA Proposal ID。必须指向 approval_status="approved" 的 proposal

version:
  type: int
  required: true
  default: 1
  description: 基线版本号。首次创建为 1，每次 reviewer 刷新基线时递增。首版不实现自动递增

scope:
  type: string
  required: true
  description: 措施适用范围。取自关联 proposal 的 target + basis 组合

approval_ref:
  type: object
  required: true
  description: 批准引用。来源为关联 proposal 的 approval_ref
  fields:
    reviewer:
      type: string
      required: true
      description: 批准人标识
    approved_at:
      type: datetime
      required: true
      format: ISO 8601
      description: 批准时间
    comments:
      type: string
      required: false
      description: 审批意见

implementation_evidence:
  type: string
  required: false
  description: 实施证据引用。指向证明措施已实施的证据（如测试报告、代码变更记录等）

effectiveness_evidence:
  type: string
  required: false
  description: 有效性证据引用。指向证明措施有效的证据（如 Effectiveness Check 结果等）

observation_window:
  type: object
  required: false
  description: 观察窗参数
  fields:
    start:
      type: date
      required: false
      format: "YYYY-MM-DD"
      description: 观察窗起始日期
    end:
      type: date
      required: false
      format: "YYYY-MM-DD"
      description: 观察窗结束日期

status:
  type: enum
  required: true
  values:
    - "needs-baseline"
    - "active"
    - "completed"
    - "needs-review"
    - "superseded"
  default: "needs-baseline"
  description: >
    正式措施状态。仅可由人工 reviewer 通过 reviewer_update_measure_status() 变更。
    needs-baseline: 尚未建立基线（系统初始值）
    active: 措施生效中
    completed: 措施已完成
    needs-review: 措施需重新评审
    superseded: 措施被新 CA/PA 取代

proposed_status:
  type: enum
  required: false
  values:
    - "needs-baseline"
    - "active"
    - "completed"
    - "needs-review"
    - "superseded"
  description: >
    系统建议状态（只读提示）。由系统根据事件检测调用 update_measure_refresh_hint() 写入。
    与 status 的区别：proposed_status 是系统提示，status 是正式状态。
    reviewer 基于 proposed_status 决定是否变更正式 status。
    值为 null 时表示无待处理提示。

refresh_hint:
  type: string
  required: false
  description: >
    刷新原因的人类可读描述。例如 "新问题可能影响措施有效性"、"可进入观察期"。
    不是结构化操作指令，下游系统不得解析此字段来自动触发状态变更。

refreshed_at:
  type: datetime
  required: false
  format: ISO 8601
  description: 提示生成时间。系统写入 update_measure_refresh_hint() 时自动填充

refreshed_by:
  type: string
  required: false
  description: 提示触发来源（事件类型）。如 "S2-change-detection"、"S2-recurrence"、"action-items-done"、"closure-decision-satisfied"、"S2-superseded"

refresh_reason:
  type: string
  required: false
  description: 刷新原因的摘要。记录触发本次提示的具体上下文（如同类复发的问题单 ID 列表）

created_at:
  type: datetime
  required: true
  format: ISO 8601
  description: 基线创建时间

# ── 约束汇总 ────────────────────────────────────────────────────────────────
#
# 1. baseline_id 全局唯一，不可变
# 2. proposal_ref 必须指向 approval_status="approved" 的 CA/PA Proposal
# 3. status 仅可由人工 reviewer 通过 reviewer_update_measure_status() 变更
# 4. proposed_status 和 refresh_hint 仅可由系统通过 update_measure_refresh_hint() 写入
# 5. 系统不得通过 update_measure_refresh_hint() 修改 status、approval_ref、baseline_id
# 6. 系统不得自动调用 insert_measure_link() 创建基线
# 7. 无基线时只标 needs-baseline，不判措施失效
# 8. superseded 状态的基线保留作为审计记录，不删除
# 9. 刷新提示不触发下游任务变更
# 10. refresh_hint 不是结构化操作指令，不得被下游系统解析
# 11. 首版不实现 version 自动递增，所有基线 version 初始为 1

# ── 刷新提示枚举 ────────────────────────────────────────────────────────────
#
# 系统 proposed_status 和 refresh_hint 的完整枚举（来源：SKILL.md §5.3）：
#
# | 触发条件                                    | proposed_status | refresh_hint                      |
# |---------------------------------------------|-----------------|----------------------------------|
# | 关联 proposal 无 MeasureBaseline            | needs-baseline  | "需先建立措施基线"                 |
# | S2 检测到新相关问题单                        | needs-review    | "新问题可能影响措施有效性"          |
# | 关联 Action Items 全部 done                 | completed       | "可进入观察期"                    |
# | 观察窗通过 + 无复发                         | active          | "观察窗已满足，措施持续有效"        |
# | S2 检测到同类问题复发                       | needs-review    | "同类复发，措施可能失效"           |
# | 措施被新的 CA/PA 取代                       | superseded      | "被新 proposal {id} 取代"        |

# ── 状态迁移图 ──────────────────────────────────────────────────────────────
#
# 正式 status 迁移（仅 reviewer 可执行）：
#
#                        ┌── reviewer 确认 ──► active
#                        │
#   needs-baseline ──────┤
#   (系统初始值)          │
#                        └── (基线缺失，等待 reviewer 操作)
#
#                     ┌── reviewer 确认完成 ──► completed
#                     │
#   active ──────────┼── reviewer 确认需复核 ──► needs-review
#                     │
#                     └── reviewer 确认被取代 ──► superseded
#
#   needs-review ──── reviewer 确认仍有效 ──► active
#
#   completed ─────── 终态（不可回退）
#   superseded ────── 终态（不可回退，保留审计记录）

# ── 示例 ─────────────────────────────────────────────────────────────────────
#
# 示例 1：新建基线（needs-baseline → reviewer 创建）
#
# baseline_id: "BASELINE-PROPOSAL-20260716-001-1"
# proposal_ref: "PROPOSAL-20260716-001"
# version: 1
# scope: "NGFW 特有场景漏测率从 18% 降至 ≤5%；基于 RA-RPT-20260716-001 §4.2"
# approval_ref:
#   reviewer: "ptm-tse-reviewer"
#   approved_at: "2026-07-16T14:00:00+08:00"
#   comments: "批准执行"
# implementation_evidence: ""
# effectiveness_evidence: ""
# observation_window:
#   start: "2026-07-16"
#   end: "2026-08-15"
# status: "active"
# proposed_status: null
# refresh_hint: null
# refreshed_at: null
# refreshed_by: null
# refresh_reason: null
# created_at: "2026-07-16T14:30:00+08:00"
#
# 示例 2：S2 检测到新问题单，系统写入刷新提示
#
# baseline_id: "BASELINE-PROPOSAL-20260716-001-1"
# proposal_ref: "PROPOSAL-20260716-001"
# version: 1
# scope: "NGFW 特有场景漏测率从 18% 降至 ≤5%；基于 RA-RPT-20260716-001 §4.2"
# approval_ref:
#   reviewer: "ptm-tse-reviewer"
#   approved_at: "2026-07-16T14:00:00+08:00"
# status: "active"                              ← 正式状态不变
# proposed_status: "needs-review"               ← 系统提示
# refresh_hint: "新问题可能影响措施有效性"        ← 人类可读描述
# refreshed_at: "2026-07-20T09:00:00+08:00"
# refreshed_by: "S2-change-detection"
# refresh_reason: "检测到 3 个新问题单属于同一 category"
# created_at: "2026-07-16T14:30:00+08:00"
#
# 示例 3：reviewer 确认后变更正式 status
#
# baseline_id: "BASELINE-PROPOSAL-20260716-001-1"
# proposal_ref: "PROPOSAL-20260716-001"
# version: 1
# scope: "NGFW 特有场景漏测率从 18% 降至 ≤5%；基于 RA-RPT-20260716-001 §4.2"
# approval_ref:
#   reviewer: "ptm-tse-reviewer"
#   approved_at: "2026-07-16T14:00:00+08:00"
# status: "needs-review"                        ← reviewer 变更
# proposed_status: "needs-review"               ← 系统提示保持
# refresh_hint: "新问题可能影响措施有效性"
# refreshed_at: "2026-07-20T09:30:00+08:00"
# refreshed_by: "ptm-tse-reviewer"              ← reviewer 操作
# refresh_reason: "reviewer 确认需重新评估措施范围"
# created_at: "2026-07-16T14:30:00+08:00"
