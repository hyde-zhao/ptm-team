  status: proposed
  proposal_date: 2026-06-03

# ═══════════════════════════════════════════════════════
# 跨领域汇总: 高复用因子统计
# ═══════════════════════════════════════════════════════
# FAC-RT-INTERFACE-TYPE: 出现在全部6个Sheet中 (最高频)
# FAC-RT-INTERFACE-STATE: 出现在静态路由、直连路由、路由转发中
# FAC-RT-PRIORITY: 出现在路由配置、静态路由、路由转发、等价路由中
# FAC-RT-WEIGHT: 出现在路由配置、静态路由、等价路由中
# FAC-RT-NEXT-HOP: 出现在路由配置、静态路由、路由转发中
# FAC-RT-DST-NETWORK: 出现在路由配置、路由转发中
# ═══════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════
# 去重检查 (与发布区已有因子对比)
# ═══════════════════════════════════════════════════════
# 1. FAC-L3-NH-IF-TYPE (ngfw-policy-routing) ←→ FAC-RT-INTERFACE-TYPE
#    重叠: 都涉及接口类型枚举。但ngfw的取值(physical/sub-interface/aggregate/bvi/tunnel)
#    和IPv4路由的取值(物理/聚合/子接口/BVI/Tunnel/PPPoE)有差异 — PPPoE是新增值。
#    判定: extend — 可能需要扩展ngfw因子或新建路由专用因子。
#
# 2. FAC-L3-REACHABILITY (ngfw-policy-routing) ←→ FAC-RT-INTERFACE-STATE
#    重叠: 都描述可达/不可达。但IPv4路由更关注接口UP/Down对路由表的影响，
#    与ngfw的reachable/unreachable/recovered语义不同。
#    判定: new_factor — 接口状态变化比ngfw的出口可达性更细粒度。
#
# 3. FAC-L3-NH-WEIGHT (ngfw-policy-routing) ←→ FAC-RT-WEIGHT
#    高重叠: 都是权重值，range都是int[1,255]，边界值(0/256)相同。
#    判定: reuse — 完全可复用，只需确认路由场景是否有特殊约束。
#
# 4. FAC-HA-ROLE / FAC-HA-SYNC-STATE (ngfw-policy-routing) ←→ FAC-RT-FWD-HA
#    重叠: 都涉及HA主备切换。路由转发聚焦切换时的转发连续性。
#    判定: reuse — 复用ngfw的HA因子，路由场景作为新的factor_group。
#
# 5. FAC-CONFIG-NAME (ngfw-policy-routing) ←→ 静态路由配置
#    低重叠: 路由配置不涉及名称字段(路由用目的网络+下一跳标识)。
#    判定: not_applicable — 路由无名称概念。
