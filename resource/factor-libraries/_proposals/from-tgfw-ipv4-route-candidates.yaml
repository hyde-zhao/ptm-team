    单臂路由(报文在同一设备上进出一对接口)的接口配对:
    不同类接口: 聚合口↔L3子接口, 物理接口↔L3子接口, L3子接口↔L3子接口
    同类接口: 物理接口↔物理接口, 聚合口↔聚合口, L3子接口↔L3子接口, BVI↔BVI, Tunnel↔Tunnel
  source: 单臂路由 Sheet R1-R5, R6-R19
  owner_object: OBJ-RT-SINGLE-ARM
  factor_kind: data
