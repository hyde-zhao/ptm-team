- factor_id: FAC-RT-ECMP-ROUTE-TYPE
  factor_name: 等价路由形成类型
  description: >
    等价路由可以由两种类型的路由形成:
    - 静态路由: 多条目的网络相同、优先级相同的静态路由(下一跳不同)
    - 默认路由: 多条默认路由(包括接口默认网关生成的路由)
    - 默认路由+接口网关: 静态默认路由与接口默认网关生成等价路由
  source: 等价路由 Sheet R2, R9-R29
  owner_object: OBJ-RT-ECMP
  factor_kind: data
  design_role: driver
  domain_model: enum
  candidate_values:
    - static_ecmp: 多条静态路由形成等价路由
    - default_ecmp: 多条默认路由形成等价路由
    - gateway_ecmp: 接口默认网关生成的路由形成等价路由
    - mixed_ecmp: 静态默认路由+接口网关形成等价路由
  notes: >
    接口默认网关生成的路由权重默认值为1。
    静态默认路由与接口默认网关路由优先级相同时能形成等价路由。
  status: proposed
  proposal_date: 2026-06-03

- factor_id: FAC-RT-ECMP-LOAD-BALANCE
  factor_name: 等价路由负载分担
  description: >
    等价路由的业务负载分担行为:
    - 分担算法: 按权重比例分发
    - 修改权重: 业务重新按新权重分担
    - 接口默认网关权重: 默认值为1
  source: 等价路由 Sheet R3, R37-R45
  owner_object: OBJ-RT-ECMP
  factor_kind: data
  design_role: driver
  domain_model: enum
  candidate_values:
    operations: [默认权重分担, 修改权重, 验证分担比例]
    gateway_default_weight: 1
  notes: >
    分担算法测试需要发送报文内容变化的流量(不同的五元组)触发哈希。
    权重分担测试有专门的执行准则文档(权重分担测试执行准则)。
  status: proposed
  proposal_date: 2026-06-03

- factor_id: FAC-RT-ECMP-LINK-CHANGE
  factor_name: 等价路由链路变更
  description: >
    等价路由中链路(成员路由)变更操作:
    - 增删路由: 增加/删除部分等价路由出口
    - 禁用启用接口: 禁用/启用部分链路出接口
    - 拔插网线: 拔出/插入部分链路出接口的网线
    - 调整成员优先级: 降低/提高部分成员路由的优先级
  source: 等价路由 Sheet R5, R46-R52
  owner_object: OBJ-RT-ECMP
  factor_kind: control
  design_role: driver
  domain_model: enum
  candidate_values:
    - add_remove_route: 增删等价路由成员
    - disable_enable_intf: 禁用启用成员出接口
    - plug_unplug: 拔插成员出接口网线
    - adjust_priority: 调整成员优先级
  notes: >
    链路变更后，等价路由自动调整成员列表:
    - 新增: 新成员加入分担
    - 减少: 被删除的成员不再分担，现有成员继续分担
    - 禁用: 禁用成员出接口 → 等价路由中移除该成员，恢复后重新加入
  status: proposed
  proposal_date: 2026-06-03

- factor_id: FAC-RT-ECMP-ROUTE-SWITCH
  factor_name: 等价路由与高优先级路由切换
  description: >
    等价路由与高优先级路由之间的切换:
    - 新增高优先级路由 → 等价路由全部失效，流量切到高优先级路由
    - 删除高优先级路由 → 等价路由恢复
    - 提高等价路由成员优先级(使之成为最高) → 非等价路由模式
    - 通过禁用/启用接口触发切换
    - 通过拔插网线触发切换
  source: 等价路由 Sheet R6, R53-R61
  owner_object: OBJ-RT-ECMP
  factor_kind: control
  design_role: driver
  domain_model: enum
  candidate_values:
    - new_higher_priority: 更高优先级路由覆盖等价路由
    - remove_higher_priority: 删除高优先级后等价路由恢复
    - promote_ecmp_member: ECMP成员升级为最高优先级
    - demote_ecmp_member: 降级后回到等价路由
  notes: >
    等价路由优先级 > 单个高优先级路由 的语义:
    优先级相同 → ECMP，优先级不同 → 只选最优(值最小)。
    切换时会有丢包。
  status: proposed
  proposal_date: 2026-06-03

- factor_id: FAC-RT-ECMP-RELIABILITY-OP
  factor_name: 等价路由可靠性操作
  description: >
    等价路由可靠性验证。反复执行以下操作各10次以上:
    - 反复链路振荡(拔插网线/禁用启用)
    - 反复修改链路权重
    - 反复设备掉电
    - 反复设备命令复位
  source: 等价路由 Sheet R7, R62-R68
  owner_object: OBJ-RT-ECMP
  factor_kind: control
  design_role: driver
  domain_model: enum
  candidate_values: [反复震荡链路, 反复修改权重, 反复设备掉电, 反复命令复位]
  notes: 与路由转发的可靠性操作有重叠但聚焦在等价路由场景。
  status: proposed
  proposal_date: 2026-06-03

- factor_id: FAC-RT-ECMP-SWITCH-TIME
  factor_name: 等价路由链路切换时间
  description: >
    等价路由链路增加/减少时的切换时间(丢包时间)。
    用丢包数量/发包速率计算切换时间，要求较上一版本不劣化。
