        materialized_value: "partially-lost"
        applicability: {config_test: not_applicable, function_test: negative}

  - factor_id: FAC-DFX-VPP-CONSISTENCY
    factor_name: VPP下发一致性
    factor_kind: oracle
    design_role: oracle
    owner_object: OBJ-DFX
