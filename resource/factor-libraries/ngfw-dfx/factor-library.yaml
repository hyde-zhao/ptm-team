        sample_class: negative_function
        description: "VPP 下发与配置源不一致。"
        representative_values: ["inconsistent"]
        expr: 'inconsistent'
        materialized_value: "inconsistent"
        applicability: {config_test: not_applicable, function_test: negative}

  - factor_id: FAC-DFX-MEMORY-TREND
    factor_name: 内存使用趋势
    factor_kind: oracle
    design_role: oracle
    owner_object: OBJ-DFX
