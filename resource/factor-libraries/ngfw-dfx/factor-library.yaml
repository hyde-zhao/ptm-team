factor_groups:
  - group_id: DFX_OBSERVABILITY
    group_name: 可维可测
    factors: [FAC-COUNTER-TARGET, FAC-COUNTER-ACTION, FAC-COUNTER-DELTA,
              FAC-LOG-OP-TYPE, FAC-LOG-FIELD-COMPLETENESS]
    coverage_strategy:
      counter: 覆盖查看、单条清零、全部清零、清零后重新增加
      log: 覆盖增删改启用禁用五种操作及日志字段完整性

  - group_id: DFX_CAPACITY
    group_name: 容限测试
    factors: [FAC-DFX-CAPACITY-DIMENSION, FAC-DFX-CAPACITY-BOUNDARY]
    coverage_strategy:
      at_limit: 每个容量维度至少覆盖一次达到上限
      exceed_limit: 每个容量维度至少覆盖一次超过上限
      cycle: 至少选择一个维度覆盖增删循环

  - group_id: DFX_RELIABILITY
    group_name: 可靠性
    factors: [FAC-DFX-RELIABILITY-LEVEL, FAC-DFX-RELIABILITY-OP, FAC-DFX-RELIABILITY-MODE]
    coverage_strategy:
      network: IP-LINK UP/Down × 所有震荡模式
      system: 重启 + 掉电 + 配置导入 + 升级 + 回滚 + 反复增删 + 反复修改 × 所有震荡模式
      interface: 接口 UP/Down × 快震 + 慢震
      module: 各进程重启 × 慢震

  - group_id: DFX_STRESS
    group_name: 压力测试
    factors: [FAC-DFX-STRESS-TYPE, FAC-DFX-STRESS-LEVEL]
    coverage_strategy:
      line_rate: 吞吐量 + 并发会话 × 线速
      gradient: 吞吐量 × 梯度百分比 (10%/50%/90%)
      extreme: 极端包长 × 线速 + 梯度
      over: 至少一种类型 × 超规格

  - group_id: DFX_STABILITY
    group_name: 稳定性
    factors: [FAC-DFX-STABILITY-TYPE, FAC-DFX-STABILITY-DURATION]
    coverage_strategy:
      soak: 浸泡测试 × 12h 起步，推荐 24h
      repeated: 反复操作 × 12h 起步

  - group_id: DFX_AVAILABILITY
    group_name: 可用性
    factors: [FAC-DFX-AVAILABILITY-METRIC]
    coverage_strategy:
      all: 五个恢复场景全部覆盖，oracle 判定时间阈值

  - group_id: DFX_CONFIG_DURABILITY
    group_name: 配置耐久性与并发
    factors: [FAC-DFX-CONCURRENT-OP, FAC-DFX-REF-COUNT, FAC-DFX-CONFIG-PERSISTENCE]
    coverage_strategy:
      positive: 单会话基线 + 已保存 + 引用计数归零
      negative: 并发修改 + 批量创建/删除 + 回滚 + 多引用

  - group_id: DFX_QUALITY_ORACLE
    group_name: 质量度量判定
    factors: [FAC-DFX-CONFIG-PERSISTENCE-RESULT, FAC-DFX-VPP-CONSISTENCY,
              FAC-DFX-MEMORY-TREND, FAC-DFX-LB-RATIO-DEVIATION,
              FAC-DFX-FAILOVER-LOSS, FAC-DFX-BATCH-RESPONSE-TIME,
              FAC-DFX-AUTH-RESULT, FAC-DFX-UPGRADE-COMPATIBILITY,
              FAC-DFX-APP-MATCH-LOSS-RATE, FAC-DFX-MULTI-PATH-CONSISTENCY]
    coverage_strategy:
      positive: 各 oracle 正向判定各覆盖一次
      negative: 各 oracle 异常判定各覆盖一次
      notes: 每个 oracle 必须与对应 driver 配对设计，避免孤立判定因子

external_consumers:
  - consumer: ngfw-ipv4-route/FAC-RT-CRUD-OP
    samples_used: [FAC-LOG-OP-TYPE, FAC-LOG-FIELD-COMPLETENESS]
    note: "路由增删改操作的 Oplog 审计"
  - consumer: ngfw-ipv4-route/FAC-RT-FWD-RELIABILITY-OP
    samples_used: [FAC-DFX-RELIABILITY-OP]
    note: "路由转发可靠性操作"
  - consumer: ngfw-policy-routing
    groups: [DFX_OBSERVABILITY, DFX_CAPACITY, DFX_STRESS, DFX_RELIABILITY]
    note: "策略路由消费全部四类 DFX 因子"
  - consumer: ngfw-policy-routing
    capacity_dimensions: [static-route-count, ecmp-group-count, ecmp-member-count, direct-route-count]
    capacity_boundaries: [at-limit, exceed-limit, add-delete-cycle]
    note: "静态路由和等价路由的容量规格验证"
  - consumer: ngfw-policy-routing
    stress_types: [throughput, connection-rate, packet-size-extreme]
    stress_levels: [line-rate, percentage]
    note: "策略路由规则匹配的吞吐量、新建速率及极端包长压力"
  - consumer: ngfw-policy-routing
    reliability_levels: [network, interface, system]
    reliability_ops: [ip-link-up, ip-link-down, if-up, if-down, reboot, power-off, config-import, upgrade, rollback]
    module_ops: [agent-restart, vpp-restart, frr-restart, snort-restart]
    expectations:
      agent-restart: "不丢包"
      vpp-restart: "业务中断后可恢复"
      frr-restart: "不丢包"
      snort-restart: "不丢包"
    note: "策略路由可靠性验证"
