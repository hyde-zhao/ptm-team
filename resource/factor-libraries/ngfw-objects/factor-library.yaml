        expr: 'from_factor(common-network/FAC-CONFIG-NAME).rejected'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [APP_EXISTING]
        rejected_config_samples: [APP_NOT_EXIST, APP_NAME_INVALID]
      function_test:
        precondition_samples: [APP_EXISTING]

  # ═══════════════════════════════════════════════════════
  # 9. 应用标签
  # API: /api/v1/customappobjtag (POST/GET/DELETE/PUT)
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-OBJ-APP-TAG
    factor_name: 应用标签
    factor_kind: data
    design_role: driver
    owner_object: OBJ-NET-OBJECT
    domain_model: object_instance
    value_type: string
    domain_expr:
      object_type: application_tag
      api: /api/v1/customappobjtag
      stored_in: topology.app_tags
      members: ngfw-objects/FAC-OBJ-APPLICATION
    aliases: [应用标签组, customappobjtag, app标签]
    applicable_when: "rule references application tag"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      应用标签是应用对象的命名集合。成员 appobjkeys 引用已存在的应用对象。
    sample_definitions:
      - sample_id: APP_TAG_EXISTING
        sample_class: valid_config
        description: "设备上已存在的应用标签名称。"
        representative_values: ["web_apps", "database_apps", "blocked_apps"]
        expr: 'from_topology.app_tags.any'
        materialized_value: "web_apps"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: APP_TAG_NOT_EXIST
        sample_class: invalid_config
        description: "设备上不存在的应用标签名称。配置应被拒绝。"
        representative_values: ["not_exist_tag"]
        expr: 'from_topology.app_tags.nonexistent'
        materialized_value: "not_exist_tag"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: APP_TAG_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。复用 FAC-CONFIG-NAME 的无效格式。"
        representative_values: [""]
        expr: 'from_factor(common-network/FAC-CONFIG-NAME).rejected'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [APP_TAG_EXISTING]
        rejected_config_samples: [APP_TAG_NOT_EXIST, APP_TAG_NAME_INVALID]
      function_test:
        precondition_samples: [APP_TAG_EXISTING]

  # ═══════════════════════════════════════════════════════
  # 10. 时间对象
  # API: /api/v1/timeobject (POST/GET/DELETE/PUT)
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-OBJ-TIME
    factor_name: 时间对象
    factor_kind: data
    design_role: driver
    owner_object: OBJ-NET-OBJECT
    domain_model: object_instance
    value_type: string
    domain_expr:
      object_type: time
      api: /api/v1/timeobject
      stored_in: topology.time_objects
      schedule_types: [oneshot, day, week, month]
    aliases: [时间对象, timeobject, 计划对象, 调度对象]
    applicable_when: "rule references time object"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      时间对象定义策略生效的时间范围。支持四种计划类型:
      - oneshot: 一次性计划 (指定起止日期时间)
      - day: 日计划 (每日的起止时间段，可多段)
      - week: 周计划 (每周指定工作日的起止时间段)
      - month: 月计划 (引用日计划 + 指定日期)
    sample_definitions:
      - sample_id: TIME_EXISTING
        sample_class: valid_config
        description: "设备上已存在的时间对象名称。"
        representative_values: ["test1", "test-d", "tets-w", "test-m", "work_hours", "maintenance_window"]
        expr: 'from_topology.time_objects.any'
        materialized_value: "work_hours"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: TIME_NOT_EXIST
        sample_class: invalid_config
        description: "设备上不存在的时间对象名称。配置应被拒绝。"
        representative_values: ["not_exist_time"]
        expr: 'from_topology.time_objects.nonexistent'
        materialized_value: "not_exist_time"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: TIME_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。复用 FAC-CONFIG-NAME 的无效格式。"
        representative_values: [""]
        expr: 'from_factor(common-network/FAC-CONFIG-NAME).rejected'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [TIME_EXISTING]
        rejected_config_samples: [TIME_NOT_EXIST, TIME_NAME_INVALID]
      function_test:
        precondition_samples: [TIME_EXISTING]

# ═══════════════════════════════════════════════════════
# 约束
# ═══════════════════════════════════════════════════════
constraints:
  # 所有对象因子的名称格式非法统一由 FAC-CONFIG-NAME 定义
  - constraint_id: C-OBJ-NAME-001
    description: "所有对象名称的格式非法值由 common-network/FAC-CONFIG-NAME.rejected 统一定义"
    if: "owner_object == OBJ-NET-OBJECT and sample_class == invalid_format"
    reuse: common-network/FAC-CONFIG-NAME.rejected

  # 对象引用完整性
  - constraint_id: C-OBJ-REF-001
    description: "地址组成员必须引用已存在的地址对象"
    if: "FAC-OBJ-ADDRESS-GROUP selected"
    require_condition: "group.ippools[i] in topology.address_objects"

  - constraint_id: C-OBJ-REF-002
    description: "服务组成员必须引用已存在的服务对象"
    if: "FAC-OBJ-SERVICE-GROUP selected"
    require_condition: "group.servicepools[i] in topology.service_objects"

  - constraint_id: C-OBJ-REF-003
    description: "应用标签成员必须引用已存在的应用对象"
    if: "FAC-OBJ-APP-TAG selected"
    require_condition: "tag.appobjkeys[i].appname in topology.application_objects"

  # 月计划引用的日计划
  - constraint_id: C-OBJ-TIME-001
    description: "月计划中的 planday 必须引用已存在的日计划时间对象"
    if: "FAC-OBJ-TIME selected and scheduletype == month"
    require_condition: "planday in topology.time_objects[scheduletype=day]"

# ═══════════════════════════════════════════════════════
# 因子组
# ═══════════════════════════════════════════════════════
factor_groups:
  - group_id: OBJ_IP_NETWORK
    group_name: IP 网络对象
    factors: [FAC-OBJ-ADDRESS, FAC-OBJ-ADDRESS-GROUP]
    coverage_strategy:
      positive: 地址对象和地址组各覆盖一个已存在名称
      negative: 不存在的名称 + 名称格式非法

  - group_id: OBJ_ADDRESS_EXCLUDE
    group_name: 地址对象排除语义
    factors: [FAC-OBJ-ADDRESS-EXCLUDE-MODE, FAC-OBJ-ADDRESS-EXCLUDE-RELATION]
    coverage_strategy:
      positive: 仅包含网段 + 包含与排除共存各覆盖一次，四种排除关系各覆盖一次
      notes: 策略路由引用地址对象时组合本组因子，流量匹配位置由 ngfw-policy-routing/FAC-TRAFFIC-ADDR-MATCH-POSITION 承载

  - group_id: OBJ_IDENTITY
    group_name: 标识对象
    factors: [FAC-OBJ-MAC, FAC-OBJ-DOMAIN, FAC-OBJ-GEOIP]
    coverage_strategy:
      positive: 每种对象覆盖一个已存在名称
      negative: 不存在的名称 + 名称格式非法

  - group_id: OBJ_SERVICE
    group_name: 服务对象
    factors: [FAC-OBJ-SERVICE, FAC-OBJ-SERVICE-GROUP]
    coverage_strategy:
      positive: 服务对象和服务组各覆盖一个已存在名称
      negative: 不存在的名称 + 名称格式非法

  - group_id: OBJ_APPLICATION
    group_name: 应用对象
    factors: [FAC-OBJ-APPLICATION, FAC-OBJ-APP-TAG]
    coverage_strategy:
      positive: 应用对象和应用标签各覆盖一个已存在名称
      negative: 不存在的名称 + 名称格式非法

  - group_id: OBJ_TIME
    group_name: 时间对象
    factors: [FAC-OBJ-TIME]
    coverage_strategy:
      positive: 覆盖四种计划类型各至少一次
      negative: 不存在的时间对象名称 + 名称格式非法

  - group_id: OBJ_ALL
    group_name: 全部对象集合
    factors: [FAC-OBJ-ADDRESS, FAC-OBJ-ADDRESS-GROUP, FAC-OBJ-MAC,
              FAC-OBJ-DOMAIN, FAC-OBJ-GEOIP, FAC-OBJ-SERVICE,
              FAC-OBJ-SERVICE-GROUP, FAC-OBJ-APPLICATION,
              FAC-OBJ-APP-TAG, FAC-OBJ-TIME]
    coverage_strategy:
      minimal: 每个对象各覆盖一个 valid + 一个 invalid

external_consumers:
  - consumer: ngfw-policy-routing/FAC-PR-RULE-SRC-NETWORK
    samples_used: [accepted, invalid_config, invalid_format]
    switch_case: false
  - consumer: ngfw-policy-routing/FAC-PR-RULE-SRC-NETWORK
    samples_used: [accepted, invalid_config, invalid_format]
    switch_case: true
  - consumer: ngfw-policy-routing/FAC-PR-RULE-DST-NETWORK
    samples_used: [accepted, invalid_config, invalid_format]
    switch_case: false
  - consumer: ngfw-policy-routing/FAC-PR-RULE-DST-NETWORK
    samples_used: [accepted, invalid_config, invalid_format]
    switch_case: true
  - consumer: ngfw-policy-routing/FAC-PR-RULE-SERVICE
    samples_used: [accepted, invalid_config, invalid_format]
    switch_case: false
  - consumer: ngfw-policy-routing/FAC-PR-RULE-SERVICE
    samples_used: [accepted, invalid_config, invalid_format]
    switch_case: true
  - consumer: ngfw-policy-routing/FAC-PR-RULE-APP-LIST
    samples_used: [accepted, invalid_config, invalid_format]
  - consumer: ngfw-policy-routing/FAC-PR-RULE-APP-TAG
    samples_used: [accepted, invalid_config, invalid_format]
  - consumer: ngfw-policy-routing/FAC-PR-RULE-TIME-OBJ
    samples_used: [accepted, invalid_config, invalid_format]
  - consumer: ngfw-policy-routing/FAC-TRAFFIC-ADDR-MATCH-POSITION
    samples_used: [accepted]
    notes: 消费地址对象排除模式与排除关系因子，构造流量匹配位置
