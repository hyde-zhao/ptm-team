        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [MAC_EXISTING]
        rejected_config_samples: [MAC_NOT_EXIST, MAC_NAME_INVALID]
      function_test:
        precondition_samples: [MAC_EXISTING]

