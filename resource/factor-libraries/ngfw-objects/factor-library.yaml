# NGFW 设备命名对象因子库
# 研究区 — ngfw-objects
# 地址对象、地址组、MAC对象、域名对象、地区对象、服务对象、服务组、
# 应用对象、应用标签、时间对象 — 是设备级命名资源。
# 策略路由、安全策略、NAT、QoS 等所有特性均消费此库。

schema_version: 1
library_id: ngfw-objects
version: 0.1.0
status: candidate
description: "NGFW 设备命名对象公共因子库。覆盖所有可被规则引用的对象类型。"

factors:

  # ═══════════════════════════════════════════════════════
  # 1. 地址对象
  # API: /api/v1/ippool (POST/GET/DELETE/PUT)
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-OBJ-ADDRESS
    factor_name: 地址对象
    factor_kind: data
    design_role: driver
    owner_object: OBJ-NET-OBJECT
    domain_model: object_instance
    value_type: string
    domain_expr:
      object_type: address
      api: /api/v1/ippool
      stored_in: topology.address_objects
    aliases: [IP地址对象, ippool, 网络对象]
    applicable_when: "rule references address object"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      地址对象是 IP 网段/地址的命名集合。可包含多个 network (ipaddr + mask)
      和排除网段 (exclnetworks)。被策略路由、安全策略等引用为源/目的地址。
    sample_definitions:
      - sample_id: ADDR_EXISTING
        sample_class: valid_config
        description: "设备上已存在的地址对象名称。"
        representative_values: ["office_net", "dmz_servers", "internal_hosts"]
        expr: 'from_topology.address_objects.any'
        materialized_value: "office_net"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: ADDR_NOT_EXIST
        sample_class: invalid_config
        description: "设备上不存在的地址对象名称。配置应被拒绝。"
        representative_values: ["not_exist_addr_obj"]
        expr: 'from_topology.address_objects.nonexistent'
        materialized_value: "not_exist_addr_obj"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: ADDR_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。复用 FAC-CONFIG-NAME 的无效格式。"
        representative_values: ["", "超长名称...", "name@bad"]
        expr: 'from_factor(common-network/FAC-CONFIG-NAME).rejected'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [ADDR_EXISTING]
        rejected_config_samples: [ADDR_NOT_EXIST, ADDR_NAME_INVALID]
      function_test:
        precondition_samples: [ADDR_EXISTING]

  # ═══════════════════════════════════════════════════════
  # 2. 地址组对象
  # API: /api/v1/ippool/group (POST/GET/DELETE/PUT)
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-OBJ-ADDRESS-GROUP
    factor_name: 地址组对象
    factor_kind: data
    design_role: driver
    owner_object: OBJ-NET-OBJECT
    domain_model: object_instance
    value_type: string
    domain_expr:
      object_type: address_group
      api: /api/v1/ippool/group
      stored_in: topology.address_groups
      members: ngfw-objects/FAC-OBJ-ADDRESS
    aliases: [地址组, ippool group, 网络对象组]
    applicable_when: "rule references address group"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      地址组是地址对象的命名集合。成员字段 ippools 引用已存在的地址对象名称。
    sample_definitions:
      - sample_id: ADDR_GROUP_EXISTING
        sample_class: valid_config
        description: "设备上已存在的地址组名称。"
        representative_values: ["internal_networks", "partner_networks"]
        expr: 'from_topology.address_groups.any'
        materialized_value: "internal_networks"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: ADDR_GROUP_NOT_EXIST
        sample_class: invalid_config
        description: "设备上不存在的地址组名称。配置应被拒绝。"
        representative_values: ["not_exist_addr_group"]
        expr: 'from_topology.address_groups.nonexistent'
        materialized_value: "not_exist_addr_group"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: ADDR_GROUP_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。复用 FAC-CONFIG-NAME 的无效格式。"
        representative_values: ["", "超长名称..."]
        expr: 'from_factor(common-network/FAC-CONFIG-NAME).rejected'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [ADDR_GROUP_EXISTING]
        rejected_config_samples: [ADDR_GROUP_NOT_EXIST, ADDR_GROUP_NAME_INVALID]
      function_test:
        precondition_samples: [ADDR_GROUP_EXISTING]

  # ═══════════════════════════════════════════════════════
  # 2.1 地址对象排除参数
  # 描述地址对象内部包含网段 (network) 与排除网段 (exclnetworks) 的配置维度
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-OBJ-ADDRESS-EXCLUDE-MODE
    factor_name: 地址对象排除模式
    factor_kind: control
    design_role: driver
    owner_object: OBJ-NET-OBJECT
    domain_model: enum
    value_type: enum
    values: [no-exclude, has-exclude]
    display_values:
      no-exclude: 仅包含网段
      has-exclude: 包含网段与排除网段共存
    aliases: [排除模式, 地址排除, exclnetworks, 排除地址]
    applicable_when: "address object configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      地址对象可配置包含网段 (network, ipaddr+mask) 和排除网段 (exclnetworks)。
      本因子描述是否启用排除网段。策略路由引用地址对象时组合本因子与
      FAC-OBJ-ADDRESS-EXCLUDE-RELATION 测试排除语义。
    sample_definitions:
      - sample_id: ADDR_EXCL_MODE_NONE
        sample_class: valid_member
        description: "地址对象仅含包含网段，无排除网段。"
        representative_values: ["no-exclude"]
        expr: 'no-exclude'
        materialized_value: "no-exclude"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: ADDR_EXCL_MODE_HAS
        sample_class: valid_member
        description: "地址对象同时含包含网段和排除网段。"
        representative_values: ["has-exclude"]
        expr: 'has-exclude'
        materialized_value: "has-exclude"
        applicability: {config_test: accepted, function_test: precondition}
    usage_profiles:
      config_test:
        accepted_config_samples: [ADDR_EXCL_MODE_NONE, ADDR_EXCL_MODE_HAS]
      function_test:
        precondition_samples: [ADDR_EXCL_MODE_NONE, ADDR_EXCL_MODE_HAS]

  - factor_id: FAC-OBJ-ADDRESS-EXCLUDE-RELATION
    factor_name: 包含与排除网段关系
    factor_kind: data
    design_role: driver
    owner_object: OBJ-NET-OBJECT
    domain_model: enum
    value_type: enum
    values: [disjoint, crossing, include-covers-exclude, exclude-covers-include]
    display_values:
      disjoint: 无交集
      crossing: 交叉
      include-covers-exclude: 包含网段包含排除网段
      exclude-covers-include: 排除网段包含包含网段
    aliases: [排除关系, 包含排除关系, 网段关系]
    applicable_when: "FAC-OBJ-ADDRESS-EXCLUDE-MODE == has-exclude"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      包含网段与排除网段的几何关系。exclude-covers-include 时地址对象有效匹配范围
      可能为空，需配合特定测试场景验证。策略路由流量匹配位置由
      ngfw-policy-routing/FAC-TRAFFIC-ADDR-MATCH-POSITION 承载。
    sample_definitions:
      - sample_id: ADDR_EXCL_REL_DISJOINT
        sample_class: valid_member
        description: "包含网段与排除网段无交集，排除网段不影响有效匹配范围。"
        representative_values: ["disjoint"]
        expr: 'disjoint'
        materialized_value: "disjoint"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: ADDR_EXCL_REL_CROSSING
        sample_class: valid_member
        description: "包含网段与排除网段部分重叠。"
        representative_values: ["crossing"]
        expr: 'crossing'
        materialized_value: "crossing"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: ADDR_EXCL_REL_INCLUDE_COVERS
        sample_class: valid_member
        description: "包含网段完全覆盖排除网段，有效匹配范围为包含网段减去排除网段。"
        representative_values: ["include-covers-exclude"]
        expr: 'include-covers-exclude'
        materialized_value: "include-covers-exclude"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: ADDR_EXCL_REL_EXCLUDE_COVERS
        sample_class: valid_member
        description: "排除网段完全覆盖包含网段，有效匹配范围为空。"
        representative_values: ["exclude-covers-include"]
        expr: 'exclude-covers-include'
        materialized_value: "exclude-covers-include"
        applicability: {config_test: accepted, function_test: precondition}
    usage_profiles:
      config_test:
        accepted_config_samples: [ADDR_EXCL_REL_DISJOINT, ADDR_EXCL_REL_CROSSING, ADDR_EXCL_REL_INCLUDE_COVERS, ADDR_EXCL_REL_EXCLUDE_COVERS]
      function_test:
        precondition_samples: [ADDR_EXCL_REL_DISJOINT]

  # ═══════════════════════════════════════════════════════
  # 3. MAC 地址对象
  # API: /api/v1/macpool (POST/GET/DELETE/PUT)
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-OBJ-MAC
    factor_name: MAC 地址对象
    factor_kind: data
    design_role: driver
    owner_object: OBJ-NET-OBJECT
    domain_model: object_instance
    value_type: string
    domain_expr:
      object_type: mac_address
      api: /api/v1/macpool
      stored_in: topology.mac_objects
    aliases: [MAC对象, macpool]
    applicable_when: "rule references MAC object"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: MAC_EXISTING
