  # ═══════════════════════════════════════════════════════
  # 路由转发
  # ═══════════════════════════════════════════════════════

  - factor_id: FAC-RT-FWD-ROUTE-TYPE
    factor_name: 转发路由类型
    factor_kind: data
    design_role: driver
    owner_object: OBJ-RT-FORWARDING
    domain_model: enum
    value_type: enum
    values: [static-host, static-net, direct, default]
    display_values:
      static-host: 静态主机路由
      static-net: 静态网段路由
      direct: 直连路由
      default: 默认路由
    aliases: [路由类型, 转发类型, route_type]
    applicable_when: always
    downstream_methods: [P-Parameter]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「路由转发」等价类划分提取。不同路由类型的转发行为在掩码最长匹配时有差异。
    sample_definitions:
      - sample_id: FWD_TYPE_STATIC_HOST
        sample_class: valid_member
        description: "静态主机路由（/32）。精确匹配单个IP。"
        representative_values: ["static-host"]
        expr: 'static-host'
        materialized_value: "static-host"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FWD_TYPE_STATIC_NET
        sample_class: valid_member
        description: "静态网段路由（非/32）。匹配网段范围。"
        representative_values: ["static-net"]
        expr: 'static-net'
        materialized_value: "static-net"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FWD_TYPE_DIRECT
        sample_class: valid_member
        description: "直连路由。优先级最高，cost=0。"
        representative_values: ["direct"]
        expr: 'direct'
        materialized_value: "direct"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FWD_TYPE_DEFAULT
        sample_class: valid_member
        description: "默认路由（0.0.0.0/0）。兜底转发。"
        representative_values: ["default"]
        expr: 'default'
        materialized_value: "default"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-RT-FWD-LONGEST-MATCH
    factor_name: 掩码最长匹配
    factor_kind: constraint
    design_role: constraint
    owner_object: OBJ-RT-FORWARDING
    domain_model: enum
    value_type: enum
    values: [static-longest, direct-longest, mixed-longest]
    display_values:
      static-longest: 静态路由间最长匹配
      direct-longest: 直连路由间最长匹配
      mixed-longest: 直连和静态混合最长匹配
    aliases: [最长匹配, 掩码优先级]
    applicable_when: "multiple routes with same network"
    downstream_methods: [P-Parameter]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「路由转发」掩码最长匹配提取。转发时仅按掩码长度选择，不参考路由优先级。
      优先级决定"哪条路由进 FIB"，掩码决定"FIB 中按哪条转发"。
    sample_definitions:
      - sample_id: LONGEST_STATIC
        sample_class: valid_member
        description: "多条静态路由按掩码最长选择。"
        representative_values: ["static-longest"]
        expr: 'static-longest'
        materialized_value: "static-longest"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: LONGEST_DIRECT
        sample_class: valid_member
        description: "多接口同网段不同掩码按最长选择。"
        representative_values: ["direct-longest"]
        expr: 'direct-longest'
        materialized_value: "direct-longest"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: LONGEST_MIXED
        sample_class: valid_member
        description: "直连路由和静态路由混合按掩码最长选择。"
        representative_values: ["mixed-longest"]
        expr: 'mixed-longest'
        materialized_value: "mixed-longest"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-RT-FWD-FLOAT-MODE
    factor_name: 浮动路由切换方式
    factor_kind: control
    design_role: driver
    owner_object: OBJ-RT-FORWARDING
    domain_model: enum
    value_type: enum
    values: [static-to-static, static-to-direct, static-to-default]
    display_values:
      static-to-static: 修改优先级切换
      static-to-direct: 直连Down切到静态
      static-to-default: 失效切到默认路由
    aliases: [浮动路由, 路由切换, float_route]
    applicable_when: always
    downstream_methods: [P-Parameter]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「路由转发」浮动路由测试提取。高优先级路由失效后次高优先级自动接管。
    sample_definitions:
      - sample_id: FLOAT_STATIC
        sample_class: positive_function
        description: "修改优先级实现静态路由间切换。"
        representative_values: ["static-to-static"]
        expr: 'static-to-static'
        materialized_value: "static-to-static"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FLOAT_DIRECT
        sample_class: positive_function
        description: "直连路由 Down 后切换到静态路由。"
        representative_values: ["static-to-direct"]
        expr: 'static-to-direct'
        materialized_value: "static-to-direct"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FLOAT_DEFAULT
        sample_class: positive_function
        description: "所有路由失效后切换到默认路由。"
        representative_values: ["static-to-default"]
        expr: 'static-to-default'
        materialized_value: "static-to-default"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-RT-FWD-ARP
    factor_name: ARP 学习状态
    factor_kind: state
    design_role: driver
    owner_object: OBJ-RT-FORWARDING
    domain_model: state
    value_type: state
    values: [not-learned, learned, expired]
    display_values:
      not-learned: 未学习
      learned: 已学习
      expired: 已过期
    aliases: [ARP, 地址解析]
    applicable_when: "forwarding validation"
    downstream_methods: [S-State]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「路由转发」ARP 可靠性测试提取。下一跳 ARP 是转发的必要条件。
    sample_definitions:
      - sample_id: ARP_NOT_LEARNED
        sample_class: negative_function
        description: "ARP 未学习。持续发送 ARP 请求，报文不通。"
        representative_values: ["not-learned"]
        expr: 'not-learned'
        materialized_value: "not-learned"
        applicability: {config_test: not_applicable, function_test: negative}
      - sample_id: ARP_LEARNED
        sample_class: positive_function
        description: "ARP 已学习。报文正常转发。"
        representative_values: ["learned"]
        expr: 'learned'
        materialized_value: "learned"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: ARP_EXPIRED
        sample_class: negative_function
        description: "ARP 过期。重新回到未学习状态。"
        representative_values: ["expired"]
        expr: 'expired'
        materialized_value: "expired"
        applicability: {config_test: not_applicable, function_test: negative}

  # 可靠性操作 — 复用 ngfw-dfx
  - factor_id: FAC-RT-FWD-RELIABILITY-OP
    factor_name: 路由转发可靠性操作
    factor_kind: control
    design_role: driver
    owner_object: OBJ-RT-FORWARDING
    domain_model: enum
    value_type: enum
    values: [cable-plug-unplug, if-disable-enable, poweroff-reset, cmd-reset,
             repeated-crud, repeated-nh-modify, repeated-if-state]
