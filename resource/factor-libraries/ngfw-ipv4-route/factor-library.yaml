      reference_targets: [ngfw-dfx/FAC-DFX-RELIABILITY-OP]

  # HA — 复用 ngfw-ha
  - factor_id: FAC-RT-FWD-HA
    factor_name: 路由转发 HA
    factor_kind: state
    design_role: driver
    owner_object: OBJ-RT-FORWARDING
    domain_model: enum
    value_type: enum
    values: [ha-switchover, fallback, route-delete-on-standby]
    aliases: [HA转发, 主备切换转发]
    applicable_when: "HA scenario"
