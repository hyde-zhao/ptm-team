# NGFW IPv4路由因子库
# 研究区 — ngfw-ipv4-route
# 来源: TGFW V60R001C00 IPv4路由特性测试用例

schema_version: 1
library_id: ngfw-ipv4-route
version: 0.1.0
status: candidate
description: "NGFW IPv4路由公共因子库，覆盖静态路由配置、路由转发表、直连路由、路由转发、单臂路由和等价路由场景。"

factors:

  # ═══════════════════════════════════════════════════════
  # FAC-L3-EGRESS-MODE — 三层转发出口选择模式
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-L3-EGRESS-MODE
    factor_name: 三层转发出口选择模式
    factor_kind: control
    design_role: driver
    owner_object: OBJ-RT-EGRESS
    domain_model: enum
    value_type: enum
    values: [next-hop, out-interface]
    display_values:
      next-hop: 下一跳
      out-interface: 出接口
    aliases: [出口模式, 转发出口类型, 三层转发出口类型]
    applicable_when: always
    downstream_methods: [P-Parameter, C-Combination]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      与发布区 ngfw-policy-routing 的 FAC-L3-EGRESS-MODE 完全一致。
      下一跳模式: 通过下一跳 IP 查找出接口，需要下一跳与接口 IP 同网段。
      出接口模式: 直接指定出接口，仅支持 Tunnel 和 PPPoE。
    sample_definitions:
      - sample_id: EGRESS_NEXT_HOP
        sample_class: valid_member
        description: "下一跳模式。路由关联下一跳 IP，系统查找匹配的接口。"
        representative_values: ["next-hop"]
        expr: 'next-hop'
        materialized_value: "next-hop"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: EGRESS_OUT_INTERFACE
        sample_class: valid_member
        description: "出接口模式。路由直接指定出接口，仅 Tunnel/PPPoE 可用。"
        representative_values: ["out-interface"]
        expr: 'out-interface'
        materialized_value: "out-interface"
        applicability: {config_test: accepted, function_test: precondition}
    usage_profiles:
      config_test:
        accepted_config_samples: [EGRESS_NEXT_HOP, EGRESS_OUT_INTERFACE]

  # ═══════════════════════════════════════════════════════
  # FAC-RT-DST-NETWORK — 目的网络地址
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-RT-DST-NETWORK
    factor_name: 目的网络地址
    factor_kind: data
    design_role: driver
    owner_object: OBJ-RT-STATIC-ROUTE
    domain_model: ip_network
    value_type: string
    domain_expr:
      version: ipv4
      semantic_constraints:
        unicast_only: true
        exclude_loopback: false
        exclude_multicast: false
        prefix_range: "0..32"
    aliases: [目的地址, 目的网段, 路由目的, 目的IP地址]
    applicable_when: always
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      # ── 有效类: 字面量 ──
      - sample_id: DST_DEFAULT
        sample_class: valid_config
        description: "默认路由，匹配任意目的IP。0.0.0.0/0 是唯一取值。"
        representative_values: ["0.0.0.0/0"]
        expr: 'ip_net("0.0.0.0/0")'
        materialized_value: "0.0.0.0/0"
        applicability: {config_test: accepted, function_test: precondition}
      # ── 有效类: 地址类+掩码范围 ──
      - sample_id: DST_CLASS_A
        sample_class: valid_config
        description: "A类单播网段。IP首段 1~126，掩码 1~31 位。"
        representative_values: ["<IP_ADDRESS>/8", "42.173.89.0/24", "126.255.255.0/31"]
        expr: 'ip_net(class=a, prefix=1..31)'
        materialized_value: "<IP_ADDRESS>/8"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: DST_CLASS_B
        sample_class: valid_config
        description: "B类单播网段。IP首段 128~191，掩码 1~31 位。"
        representative_values: ["<IP_ADDRESS>/12", "150.100.50.0/24", "191.255.255.0/31"]
        expr: 'ip_net(class=b, prefix=1..31)'
        materialized_value: "<IP_ADDRESS>/12"
        applicability: {config_test: accepted, function_test: precondition}
      # ── 有效类: 主机路由 ──
      - sample_id: DST_HOST_B
        sample_class: valid_config
        description: "B类主机路由，掩码 32 位。精确匹配单个IP。"
        representative_values: ["223.255.255.255/32", "128.0.0.1/32", "191.255.255.254/32"]
        expr: 'ip_net(class=b, prefix=32)'
        materialized_value: "223.255.255.255/32"
        applicability: {config_test: accepted, function_test: preferred_precondition}
      - sample_id: DST_HOST_A
        sample_class: valid_config
        description: "A类主机路由，掩码 32 位。与网段路由形成最长匹配对比。"
        representative_values: ["1.0.0.1/32", "60.173.89.42/32", "126.255.255.254/32"]
        expr: 'ip_net(class=a, prefix=32)'
        materialized_value: "1.0.0.1/32"
        applicability: {config_test: accepted, function_test: precondition}
      # ── 有效类: 边界合法 ──
      - sample_id: DST_CLASS_D_SHORT_PREFIX
        sample_class: valid_config
        description: "D类组播地址仅 1~2 位掩码时可配置。合法边界值。"
        representative_values: ["224.0.0.0/1", "238.255.255.0/2"]
        expr: 'ip_net(class=d, prefix=1..2)'
        materialized_value: "224.0.0.0/1"
        applicability: {config_test: accepted, function_test: not_applicable}
      - sample_id: DST_LOOPBACK_SHORT_PREFIX
        sample_class: valid_config
        description: "127环回地址仅 1~7 位掩码时可配置。合法边界值。"
        representative_values: ["127.0.0.0/1", "127.255.255.0/7"]
        expr: 'ip_net(class=loopback, prefix=1..7)'
        materialized_value: "127.0.0.0/1"
        applicability: {config_test: accepted, function_test: not_applicable}
      # ── 语义无效 ──
      - sample_id: DST_CLASS_D_INVALID_PREFIX
        sample_class: invalid_config
        description: "D类组播地址掩码 ≥3 位。格式正确但语义非法（组播不能做单播路由目的）。"
        representative_values: ["224.0.0.0/4", "233.45.12.0/15", "239.255.255.0/32"]
        expr: 'ip_net(class=d, prefix=3..32, invalid=true)'
        materialized_value: "224.0.0.0/4"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: DST_LOOPBACK_INVALID_PREFIX
        sample_class: invalid_config
        description: "127环回地址掩码 ≥8 位。环回地址不应作为路由目的网络。"
        representative_values: ["127.0.0.1/8", "127.0.0.0/16", "127.255.255.255/32"]
        expr: 'ip_net(class=loopback, prefix=8..32, invalid=true)'
        materialized_value: "127.0.0.1/8"
        applicability: {config_test: rejected, function_test: not_applicable}
      # ── 格式无效 ──
      - sample_id: DST_EMPTY
        sample_class: invalid_format
        description: "目的网络为空字符串。必填字段缺失。"
        representative_values: [""]
        expr: 'invalid_format(type=empty)'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: DST_TOO_LONG
        sample_class: invalid_format
        description: "目的网络字符串超出正常IP网段长度上限。"
        representative_values: ["<IP_ADDRESS>.10.20/24/32/extra"]
        expr: 'invalid_format(type=too_long)'
        materialized_value: "<IP_ADDRESS>.10.20/24/32/extra"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: DST_3_SEGMENTS
        sample_class: invalid_format
        description: "仅3段点分十进制，缺少一段。"
        representative_values: ["192.168.1", "10.0.0"]
        expr: 'invalid_format(type=wrong_segments, segments=3)'
        materialized_value: "192.168.1"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: DST_5_SEGMENTS
        sample_class: invalid_format
        description: "5段点分十进制，多余一段。"
        representative_values: ["1.2.3.4.5", "<IP_ADDRESS>.100"]
        expr: 'invalid_format(type=wrong_segments, segments=5)'
        materialized_value: "1.2.3.4.5"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: DST_BAD_SEPARATOR
        sample_class: invalid_format
        description: "IP段之间使用非点号分隔符（如中划线）。"
        representative_values: ["192-168-1-1/24", "10:0:0:0/8"]
        expr: 'invalid_format(type=bad_separator, sep="-")'
        materialized_value: "192-168-1-1/24"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: DST_BAD_MASK_SEP
        sample_class: invalid_format
        description: "掩码前不使用正斜杠分隔（如反斜杠、冒号）。"
        representative_values: ["<IP_ADDRESS>\\24", "<IP_ADDRESS>:8"]
        expr: 'invalid_format(type=bad_mask_sep, sep="\\")'
        materialized_value: "<IP_ADDRESS>\\24"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: DST_HEX_FORMAT
        sample_class: invalid_format
        description: "IP地址使用16进制格式，不支持。"
        representative_values: ["0xC0A80101/24", "0x0A000001/8"]
        expr: 'invalid_format(type=hex)'
        materialized_value: "0xC0A80101/24"
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples:
          [DST_DEFAULT, DST_CLASS_A, DST_CLASS_B, DST_HOST_B,
           DST_HOST_A, DST_CLASS_D_SHORT_PREFIX, DST_LOOPBACK_SHORT_PREFIX]
        rejected_config_samples:
          [DST_CLASS_D_INVALID_PREFIX, DST_LOOPBACK_INVALID_PREFIX,
           DST_EMPTY, DST_TOO_LONG, DST_3_SEGMENTS, DST_5_SEGMENTS,
           DST_BAD_SEPARATOR, DST_BAD_MASK_SEP, DST_HEX_FORMAT]
      function_test:
        precondition_samples: [DST_DEFAULT, DST_CLASS_A, DST_CLASS_B, DST_HOST_B, DST_HOST_A]

  # ═══════════════════════════════════════════════════════
  # FAC-RT-NEXT-HOP — 下一跳地址
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-RT-NEXT-HOP
    factor_name: 下一跳地址
    factor_kind: data
    design_role: driver
    owner_object: OBJ-RT-STATIC-ROUTE
    domain_model: ip_address
    value_type: string
    domain_expr:
      version: ipv4
      octet_constraints:
        octet1: "1..223"
        octet2: "0..255"
        octet3: "0..255"
        octet4: "0..255"
      semantic_constraints:
        exclude_zero_network: true
        exclude_loopback: true
        exclude_multicast: true
      reference_targets: [ngfw-interface/FAC-IF-IPV4-ADDRESS]
      note: "下一跳必须与至少一个接口 IP 同网段，不能等于任何本机接口 IP"
    aliases: [下一跳IP, 网关地址, next_hop]
    applicable_when: "FAC-L3-EGRESS-MODE == next-hop"
    downstream_methods: [D-Data, P-Parameter, C-Combination]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      # ── 有效类: 精确锚点 ──
      - sample_id: NH_ANCHOR_MIN
        sample_class: valid_config
        description: "最小合法单播地址。1.0.0.0。"
        representative_values: ["1.0.0.0"]
        expr: 'ip_addr("1.0.0.0")'
        materialized_value: "1.0.0.0"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: NH_ANCHOR_MAX
        sample_class: valid_config
        description: "最大合法单播地址。223.255.255.255。"
        representative_values: ["223.255.255.255"]
        expr: 'ip_addr("223.255.255.255")'
        materialized_value: "223.255.255.255"
        applicability: {config_test: accepted, function_test: precondition}
      # ── 有效类: 首段范围 ──
      - sample_id: NH_FIRST_1_126
        sample_class: valid_config
        description: "首段 1~126。涵盖原 A 类单播地址范围。"
        representative_values: ["<IP_ADDRESS>", "60.173.89.42", "126.255.255.254"]
        expr: 'ip_addr(first=1..126)'
        materialized_value: "<IP_ADDRESS>"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: NH_FIRST_128_191
        sample_class: valid_config
        description: "首段 128~191。涵盖原 B 类单播地址范围。"
        representative_values: ["<IP_ADDRESS>", "150.100.50.42", "191.255.255.254"]
        expr: 'ip_addr(first=128..191)'
        materialized_value: "<IP_ADDRESS>"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: NH_FIRST_192_223
        sample_class: valid_config
        description: "首段 192~223。涵盖原 C 类单播地址范围，私网地址段。"
        representative_values: ["<IP_ADDRESS>", "200.100.50.42", "223.255.255.254"]
        expr: 'ip_addr(first=192..223)'
        materialized_value: "<IP_ADDRESS>"
        applicability: {config_test: accepted, function_test: preferred_precondition}
      # ── 语义无效: 零网段 ──
      - sample_id: NH_ZERO_NET
        sample_class: invalid_config
        description: "零网段地址。0.x.x.x 不能作为下一跳。"
        representative_values: ["0.0.0.0", "0.0.0.1", "0.255.255.255"]
        expr: 'ip_addr(first=0)'
        materialized_value: "0.0.0.0"
        applicability: {config_test: rejected, function_test: not_applicable}
      # ── 语义无效: D类组播 ──
      - sample_id: NH_CLASS_D
        sample_class: invalid_config
        description: "D类组播地址。224.x.x.x ~ 239.x.x.x 不能作为下一跳。"
        representative_values: ["224.0.0.1", "233.45.12.42", "239.255.255.254"]
        expr: 'ip_addr(first=224..239)'
        materialized_value: "224.0.0.1"
        applicability: {config_test: rejected, function_test: not_applicable}
      # ── 语义无效: 127环回 ──
      - sample_id: NH_LOOPBACK
        sample_class: invalid_config
        description: "127环回地址。127.x.x.x 不能作为下一跳。"
        representative_values: ["127.0.0.1", "127.0.0.2", "127.255.255.254"]
        expr: 'ip_addr(first=127)'
        materialized_value: "127.0.0.1"
        applicability: {config_test: rejected, function_test: not_applicable}
      # ── 语义无效: 本机接口IP ──
      - sample_id: NH_OWN_INTERFACE_IP
        sample_class: invalid_config
        description: "下一跳与本机已有接口IP地址相同。配置应被拒绝。依赖拓扑上下文。"
        representative_values: ["<IP_ADDRESS>", "<IP_ADDRESS>"]
        expr: 'from_topology.interface_ips.any'
        materialized_value: "<IP_ADDRESS>"
        applicability: {config_test: rejected, function_test: not_applicable}
      # ── 格式无效 ──
      - sample_id: NH_EMPTY
        sample_class: invalid_format
        description: "下一跳为空字符串。必填字段缺失。"
        representative_values: [""]
        expr: 'invalid_format(type=empty)'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: NH_TOO_LONG
        sample_class: invalid_format
        description: "下一跳字符串超出正常IP地址长度上限。"
        representative_values: ["<IP_ADDRESS>.10.20"]
        expr: 'invalid_format(type=too_long)'
        materialized_value: "<IP_ADDRESS>.10.20"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: NH_3_SEGMENTS
        sample_class: invalid_format
        description: "仅3段点分十进制，缺少一段。"
        representative_values: ["192.168.1", "10.0.0"]
        expr: 'invalid_format(type=wrong_segments, segments=3)'
        materialized_value: "192.168.1"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: NH_5_SEGMENTS
        sample_class: invalid_format
        description: "5段点分十进制，多余一段。"
        representative_values: ["1.2.3.4.5", "<IP_ADDRESS>.100"]
        expr: 'invalid_format(type=wrong_segments, segments=5)'
        materialized_value: "1.2.3.4.5"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: NH_BAD_SEPARATOR
        sample_class: invalid_format
        description: "IP段之间使用非点号分隔符（如中划线）。"
        representative_values: ["192-168-1-1", "10:0:0:1"]
        expr: 'invalid_format(type=bad_separator, sep="-")'
        materialized_value: "192-168-1-1"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: NH_HEX
        sample_class: invalid_format
        description: "IP地址使用16进制格式，不支持。"
        representative_values: ["0xC0A80101", "0x0A000001"]
        expr: 'invalid_format(type=hex)'
        materialized_value: "0xC0A80101"
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples:
          [NH_ANCHOR_MIN, NH_ANCHOR_MAX, NH_FIRST_1_126, NH_FIRST_128_191, NH_FIRST_192_223]
        rejected_config_samples:
          [NH_ZERO_NET, NH_CLASS_D, NH_LOOPBACK, NH_OWN_INTERFACE_IP,
           NH_EMPTY, NH_TOO_LONG, NH_3_SEGMENTS, NH_5_SEGMENTS, NH_BAD_SEPARATOR, NH_HEX]
      function_test:
        precondition_samples: [NH_FIRST_192_223]
    constraints:
      - constraint_id: C-RT-NH-001
        description: "下一跳不能是本机已有接口IP"
        if: "next_hop in topology.interface_ips"
        forbid_usage:
          config_test: [accepted]

# ═══════════════════════════════════════════════════════
# 约束（库级）
# ═══════════════════════════════════════════════════════
constraints:
  # 下一跳模式: 下一跳必须与至少一个接口IP同网段
  - constraint_id: C-RT-NH-002
    description: "下一跳必须与至少一个本机接口IP在同一网段，否则路由不在FIB中生效"
    if: "FAC-L3-EGRESS-MODE == next-hop and FAC-RT-NEXT-HOP selected"
    require_condition: "next_hop in subnet_of(topology.interface_ips)"
    forbid_usage:
      function_test: [positive]

  # 出接口模式: 只允许 Tunnel/PPPoE
  - constraint_id: C-RT-EGRESS-001
    description: "出接口模式支持 PPPoE 和隧道接口类型（4over6/6over4/gre/sslvpn/ipsec）"
    if: "FAC-L3-EGRESS-MODE == out-interface"
    allowed_values:
      FAC-L3-OUTIF-TYPE: [pppoe, 4over6, 6over4, gre, sslvpn, ipsec]

  # 下一跳模式: 禁止 Tunnel/PPPoE 作为出接口类型
  - constraint_id: C-RT-EGRESS-002
    description: "下一跳模式使用常规接口类型，禁止出接口模式的特殊接口"
    if: "FAC-L3-EGRESS-MODE == next-hop"
    forbid: [FAC-RT-OUTIF-TYPE]

  # 路由唯一性
  - constraint_id: C-RT-UNIQUENESS-001
    description: "目的网络+下一跳相同时视为重复路由，配置拒绝"
    if: "FAC-RT-DST-NETWORK == duplicate and FAC-RT-NEXT-HOP == duplicate"
    forbid_usage:
      config_test: [accepted]

  # 同网段修改接口IP
  - constraint_id: C-RT-SUBNET-001
    description: "同网段修改接口IP不改变路由表，但改为与下一跳相同地址时修改失败"
    if: "FAC-RT-INTERFACE-STATE in [UP, Down-to-UP] and modify_interface_ip"
    forbid_condition: "new_interface_ip == FAC-RT-NEXT-HOP"

  # ECMP 与 LB 策略的优先级
  - constraint_id: C-RT-ECMP-LB-001
    description: "接口被 LB 策略管理时，路由级 ECMP 不生效，以 LB 策略为准"
    if: "FAC-RT-ECMP-ROUTE-TYPE selected and interface in ngfw-load-balance.lb.interfaces"
    forbid: [FAC-RT-ECMP-LOAD-BALANCE, FAC-RT-ECMP-LINK-CHANGE, FAC-RT-ECMP-ROUTE-SWITCH]

  # ═══════════════════════════════════════════════════════
  # L3 出口因子（从 ngfw-policy-routing 迁移）
  # ═══════════════════════════════════════════════════════

  - factor_id: FAC-L3-NH-IF-TYPE
    factor_name: 下一跳关联接口类型
    factor_kind: data
    design_role: driver
    owner_object: OBJ-RT-EGRESS
    domain_model: enum
    value_type: enum
    values: [physical, sub-interface, aggregate, bvi, 4over6, gre, sslvpn, ipsec]
    display_values:
      physical: 物理口
      sub-interface: 子接口
      aggregate: 聚合口
      bvi: BVI接口
      4over6: 4over6 隧道口
      gre: GRE 隧道口
      sslvpn: SSL VPN 隧道口
      ipsec: IPSec 隧道口
    aliases: [下一跳接口类型, 下一跳所在接口]
    applicable_when: "FAC-L3-EGRESS-MODE == next-hop"
    downstream_methods: [C-Combination]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从 ngfw-policy-routing 迁移。下一跳模式下可选接口类型。原 tunnel 细化为
      4over6/gre/sslvpn/ipsec 四种隧道接口类型（下一跳模式不含 6over4）。
    sample_definitions:
      - sample_id: NH_IF_PHYSICAL
        sample_class: valid_member
        description: "下一跳出接口为物理口。"
        representative_values: ["physical"]
