  # ═══════════════════════════════════════════════════════
  # FAC-RT-INTERFACE-STATE — 出接口状态
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-RT-INTERFACE-STATE
    factor_name: 出接口状态
    factor_kind: state
    design_role: driver
    owner_object: OBJ-RT-INTERFACE
    domain_model: state
    value_type: state
    values: [UP, Down, Down-to-UP]
    display_values:
      UP: 接口 UP
      Down: 接口 Down
      Down-to-UP: 接口恢复
    aliases: [接口状态, 端口状态, interface_state]
    applicable_when: always
    downstream_methods: [S-State, C-Combination]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「静态路由」流程图和路由转发表测试点提取。
      接口物理状态变化直接影响所有关联路由的 FIB 状态。
      - 与 FAC-L3-REACHABILITY 的区别: 本因子是接口物理状态，REACHABILITY 是出口语义状态
      - 同网段修改接口IP(不改为与下一跳相同)时路由表不变，但改为与下一跳相同时修改失败
    sample_definitions:
      - sample_id: IF_UP
        sample_class: positive_function
        description: "接口 UP。关联路由进入 FIB，正常转发。"
        representative_values: ["UP"]
        expr: 'UP'
        materialized_value: "UP"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: IF_DOWN
        sample_class: negative_function
        description: "接口 Down。关联路由从 FIB 中移除，转发中断。"
        representative_values: ["Down"]
        expr: 'Down'
        materialized_value: "Down"
        applicability: {config_test: not_applicable, function_test: negative}
      - sample_id: IF_DOWN_TO_UP
        sample_class: positive_function
        description: "接口从 Down 恢复到 UP。关联路由重新进入 FIB，转发恢复。"
        representative_values: ["Down-to-UP"]
        expr: 'Down-to-UP'
        materialized_value: "Down-to-UP"
        applicability: {config_test: not_applicable, function_test: positive}

  # ═══════════════════════════════════════════════════════
  # FAC-RT-NEXT-HOP-MATCH — 下一跳接口匹配状态
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-RT-NEXT-HOP-MATCH
    factor_name: 下一跳接口匹配状态
    factor_kind: condition
    design_role: driver
    owner_object: OBJ-RT-FIB
    domain_model: enum
    value_type: enum
    values: [direct-match, delayed-match, no-match, match-to-unmatch, unmatch-to-match]
    display_values:
      direct-match: 配置时已匹配
      delayed-match: 接口配IP后匹配
      no-match: 永远不匹配
      match-to-unmatch: 匹配变为不匹配
      unmatch-to-match: 不匹配变为匹配
    aliases: [下一跳匹配, 接口匹配状态, NH匹配]
    applicable_when: "FAC-L3-EGRESS-MODE == next-hop"
    downstream_methods: [S-State, C-Combination]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「静态路由」流程图法提取。描述下一跳 IP 与接口 IP 网段的匹配关系变化。
      direct-match: 配置路由时下一跳已在某接口网段内 → 立即生成 FIB
      delayed-match: 配置路由时下一跳不匹配 → 接口配IP后才匹配 → 延迟生成 FIB
      no-match: 下一跳与所有接口 IP 不在任何网段 → 路由永远不在 FIB 中
      match-to-unmatch: 修改接口IP或下一跳导致不再匹配 → FIB 移除
      unmatch-to-match: 修改接口IP或下一跳导致重新匹配 → FIB 新增
    sample_definitions:
      - sample_id: NH_MATCH_DIRECT
        sample_class: positive_function
        description: "直接匹配。配置路由时下一跳已在接口网段，立即生成 FIB。"
        representative_values: ["direct-match"]
        expr: 'direct-match'
        materialized_value: "direct-match"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: NH_MATCH_DELAYED
        sample_class: positive_function
        description: "延迟匹配。先配路由后配接口IP，接口配IP后生成 FIB。"
        representative_values: ["delayed-match"]
        expr: 'delayed-match'
        materialized_value: "delayed-match"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: NH_NO_MATCH
        sample_class: negative_function
        description: "永远不匹配。下一跳与所有接口不在任何网段，路由不在 FIB 中。"
        representative_values: ["no-match"]
        expr: 'no-match'
        materialized_value: "no-match"
        applicability: {config_test: not_applicable, function_test: negative}
      - sample_id: NH_MATCH_TO_UNMATCH
        sample_class: negative_function
        description: "从匹配变为不匹配。修改接口IP或下一跳导致路由从 FIB 移除。"
        representative_values: ["match-to-unmatch"]
        expr: 'match-to-unmatch'
        materialized_value: "match-to-unmatch"
        applicability: {config_test: not_applicable, function_test: negative}
      - sample_id: NH_UNMATCH_TO_MATCH
        sample_class: positive_function
        description: "从不匹配变为匹配。修改接口IP或下一跳导致路由进入 FIB。"
        representative_values: ["unmatch-to-match"]
        expr: 'unmatch-to-match'
        materialized_value: "unmatch-to-match"
        applicability: {config_test: not_applicable, function_test: positive}

  # ═══════════════════════════════════════════════════════
  # FAC-RT-FIB-PATH — 路由转发表生成路径
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-RT-FIB-PATH
    factor_name: 路由转发表生成路径
    factor_kind: process
    design_role: driver
    owner_object: OBJ-RT-FIB
    domain_model: enum
    value_type: enum
    values: [path1-direct-up, path2-delayed-up, path3-direct-down-up, path4-delayed-down-up]
    display_values:
      path1-direct-up: 下一跳匹配+接口UP→立即生成
      path2-delayed-up: 下一跳不匹配+配IP后匹配+接口UP→延迟生成
      path3-direct-down-up: 下一跳匹配+接口Down→UP后生成
      path4-delayed-down-up: 下一跳不匹配+配IP后匹配+接口Down→UP后生成
    aliases: [FIB路径, FIB生成路径, 转发表路径]
    applicable_when: "FAC-RT-CRUD-OP == create"
    downstream_methods: [P-Parameter]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「静态路由」流程图法提取的 4 条 FIB 生成路径。
      path1: 配置路由 → 下一跳直接匹配 → 接口 UP → 立即生成 FIB
      path2: 配置路由 → 下一跳不匹配 → 配接口IP后匹配 → 接口 UP → 延迟生成 FIB
      path3: 配置路由 → 下一跳匹配 → 接口 Down → 接口 UP 后生成 FIB
      path4: 配置路由 → 下一跳不匹配 → 配IP后匹配 → 接口 Down → 接口 UP 后生成 FIB
    sample_definitions:
      - sample_id: FIB_PATH1
        sample_class: positive_function
        description: "path1: 下一跳直接匹配+接口UP → 立即生成 FIB。"
        representative_values: ["path1-direct-up"]
        expr: 'path1-direct-up'
        materialized_value: "path1-direct-up"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FIB_PATH2
        sample_class: positive_function
        description: "path2: 延迟匹配+接口UP → 延迟生成 FIB。"
        representative_values: ["path2-delayed-up"]
        expr: 'path2-delayed-up'
        materialized_value: "path2-delayed-up"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FIB_PATH3
        sample_class: positive_function
        description: "path3: 直接匹配+Down→UP → FIB 恢复。"
        representative_values: ["path3-direct-down-up"]
        expr: 'path3-direct-down-up'
        materialized_value: "path3-direct-down-up"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FIB_PATH4
        sample_class: positive_function
        description: "path4: 延迟匹配+Down→UP → FIB 恢复。"
        representative_values: ["path4-delayed-down-up"]
        expr: 'path4-delayed-down-up'
        materialized_value: "path4-delayed-down-up"
        applicability: {config_test: not_applicable, function_test: positive}

  # ═══════════════════════════════════════════════════════
  # FAC-RT-FIB-DELETE-COND — FIB 删除条件
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-RT-FIB-DELETE-COND
    factor_name: FIB 删除条件
    factor_kind: control
    design_role: driver
    owner_object: OBJ-RT-FIB
    domain_model: enum
    value_type: enum
    values: [nh-subnet-change, if-ip-subnet-change, if-disable, if-cable-unplug, route-delete]
    display_values:
      nh-subnet-change: 修改下一跳致不匹配
      if-ip-subnet-change: 修改接口IP致不匹配
      if-disable: 禁用出接口
      if-cable-unplug: 拔出网线
      route-delete: 删除路由
    aliases: [FIB删除, FIB失效, 路由失效条件]
    applicable_when: "FAC-RT-FIB-PATH selected"
    downstream_methods: [P-Parameter, S-State]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「静态路由」FIB 删除条件提取。5 种导致路由从 FIB 中移除的场景。
      route-delete 删除路由配置本身，其余 4 种是路由配置保留但 FIB 中移除。
    sample_definitions:
      - sample_id: FIB_DEL_NH_CHANGE
        sample_class: negative_function
        description: "修改下一跳与所有接口IP不在相同网段，路由从 FIB 移除。"
        representative_values: ["nh-subnet-change"]
        expr: 'nh-subnet-change'
        materialized_value: "nh-subnet-change"
        applicability: {config_test: not_applicable, function_test: negative}
      - sample_id: FIB_DEL_IF_IP_CHANGE
        sample_class: negative_function
        description: "修改接口IP与下一跳不在相同网段，路由从 FIB 移除。"
        representative_values: ["if-ip-subnet-change"]
        expr: 'if-ip-subnet-change'
        materialized_value: "if-ip-subnet-change"
        applicability: {config_test: not_applicable, function_test: negative}
      - sample_id: FIB_DEL_DISABLE
        sample_class: negative_function
        description: "禁用路由出接口，路由从 FIB 移除。"
        representative_values: ["if-disable"]
        expr: 'if-disable'
        materialized_value: "if-disable"
        applicability: {config_test: not_applicable, function_test: negative}
      - sample_id: FIB_DEL_UNPLUG
        sample_class: negative_function
        description: "拔出路由出接口网线，路由从 FIB 移除。"
        representative_values: ["if-cable-unplug"]
        expr: 'if-cable-unplug'
        materialized_value: "if-cable-unplug"
        applicability: {config_test: not_applicable, function_test: negative}
      - sample_id: FIB_DEL_ROUTE
        sample_class: negative_function
        description: "删除路由配置本身，路由从 FIB 移除。"
        representative_values: ["route-delete"]
        expr: 'route-delete'
        materialized_value: "route-delete"
        applicability: {config_test: not_applicable, function_test: negative}

  # ═══════════════════════════════════════════════════════
  # FAC-RT-FIB-INTERFACE-SWITCH — FIB 出接口切换
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-RT-FIB-INTERFACE-SWITCH
    factor_name: FIB 出接口切换
    factor_kind: control
    design_role: driver
    owner_object: OBJ-RT-FIB
    domain_model: enum
    value_type: enum
    values: [nh-switch-to-other-if, longer-mask-priority, shorter-mask-failover]
    display_values:
      nh-switch-to-other-if: 下一跳切换到其他接口
      longer-mask-priority: 更长掩码接口优先
      shorter-mask-failover: 更短掩码出接口Down后接管
    aliases: [出接口切换, FIB接口切换, 路由切换接口]
    applicable_when: "FAC-RT-INTERFACE-STATE changes"
    downstream_methods: [P-Parameter, S-State]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「静态路由」FIB 出接口切换测试点提取。
      longer-mask-priority: 与掩码最长匹配原则一致。
      shorter-mask-failover: 原出接口 Down 后才接管。
    sample_definitions:
      - sample_id: FIB_SWITCH_NH
        sample_class: positive_function
        description: "修改下一跳与其他接口IP在同网段，出接口切换到新接口。"
        representative_values: ["nh-switch-to-other-if"]
        expr: 'nh-switch-to-other-if'
        materialized_value: "nh-switch-to-other-if"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FIB_SWITCH_LONGER
        sample_class: positive_function
        description: "配置更长掩码的接口IP与路由同网段，出接口切换。"
        representative_values: ["longer-mask-priority"]
        expr: 'longer-mask-priority'
        materialized_value: "longer-mask-priority"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: FIB_SWITCH_FAILOVER
        sample_class: positive_function
        description: "原出接口 Down，更短掩码的接口接管。"
        representative_values: ["shorter-mask-failover"]
        expr: 'shorter-mask-failover'
        materialized_value: "shorter-mask-failover"
        applicability: {config_test: not_applicable, function_test: positive}

