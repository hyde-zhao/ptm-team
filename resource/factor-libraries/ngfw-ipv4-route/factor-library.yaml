  # ═══════════════════════════════════════════════════════
  # FAC-RT-PRIORITY — 路由优先级
  # ═══════════════════════════════════════════════════════
  - factor_id: FAC-RT-PRIORITY
    factor_name: 路由优先级
    factor_kind: data
    design_role: driver
    owner_object: OBJ-RT-STATIC-ROUTE
    domain_model: range
    value_type: integer
    domain_expr: "int[1,255]"
    aliases: [优先级, preference, 路由管理距离]
    applicable_when: always
    downstream_methods: [D-Data, P-Parameter]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「路由配置」等价类划分提取。值越小优先级越高。多条目的网络相同的路由，
      仅最高优先级(值最小)的进入 FIB。默认值为 60。直连路由优先级固定为 0。
    sample_definitions:
      - sample_id: PRI_MIN
        sample_class: boundary_min
        description: "优先级最大值（最高优先级），即 1。"
        representative_values: ["1"]
        expr: "min"
        materialized_value: 1
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PRI_MAX
        sample_class: boundary_max
        description: "优先级最小值（最低优先级），即 255。"
        representative_values: ["255"]
        expr: "max"
        materialized_value: 255
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PRI_NOMINAL
        sample_class: in_range_nominal
        description: "优先级域内随机典型值 2~254。seed=case_id 保证可复现。"
        representative_values: ["60", "100", "200"]
        expr: "random_int(2,254,seed=case_id)"
        materialized_value: 60
        applicability: {config_test: accepted, function_test: preferred_precondition}
      - sample_id: PRI_DEFAULT
        sample_class: valid_config
        description: "不配置优先级，使用默认值 60。"
        representative_values: ["60 (默认)"]
        expr: "default"
        materialized_value: 60
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PRI_BELOW_MIN
        sample_class: below_min
        description: "优先级低于最小值，即 0。配置应被拒绝。"
        representative_values: ["0"]
        expr: "min - 1"
        materialized_value: 0
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PRI_ABOVE_MAX
        sample_class: above_max
        description: "优先级高于最大值，即 256。配置应被拒绝。"
        representative_values: ["256"]
        expr: "max + 1"
        materialized_value: 256
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PRI_STRING
        sample_class: invalid_format
        description: "优先级为非数字字符串。配置应被拒绝。"
        representative_values: ["high"]
        expr: "invalid_format(type=not_numeric)"
        materialized_value: "high"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PRI_TOO_LONG
        sample_class: invalid_format
        description: "优先级为超长字符串。配置应被拒绝。"
        representative_values: ["12345678901234567890"]
        expr: 'invalid_format(type=too_long)'
        materialized_value: "12345678901234567890"
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [PRI_MIN, PRI_MAX, PRI_NOMINAL, PRI_DEFAULT]
        rejected_config_samples: [PRI_BELOW_MIN, PRI_ABOVE_MAX, PRI_STRING, PRI_TOO_LONG]
      function_test:
        precondition_samples: [PRI_NOMINAL]

