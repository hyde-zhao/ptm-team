        materialized_value: "isolated"
        applicability: {config_test: not_applicable, function_test: positive}

  # ═══════════════════════════════════════════════════════
  # 等价路由 ECMP
  # ═══════════════════════════════════════════════════════

  - factor_id: FAC-RT-ECMP-ROUTE-TYPE
    factor_name: 等价路由形成类型
    factor_kind: data
    design_role: driver
    owner_object: OBJ-RT-ECMP
    domain_model: enum
    value_type: enum
    domain_expr:
      reference_targets: [ngfw-load-balance/FAC-LB-POLICY-MODE]
      note: "LB 策略覆盖接口时优先生效"
    values: [static-ecmp, default-ecmp, gateway-ecmp, mixed-ecmp]
    display_values:
      static-ecmp: 静态路由ECMP
      default-ecmp: 默认路由ECMP
      gateway-ecmp: 接口网关ECMP
      mixed-ecmp: 静态+网关混合ECMP
    aliases: [ECMP类型, 等价路由类型, ecmp_type]
    applicable_when: "multiple routes with same destination and priority"
    downstream_methods: [P-Parameter]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      从「等价路由」等价类划分提取。形成 ECMP 的前提: 同目的网络 + 同优先级 + 不同下一跳。
    sample_definitions:
      - sample_id: ECMP_STATIC
        sample_class: positive_function
        description: "多条静态路由形成等价路由。"
        representative_values: ["static-ecmp"]
        expr: 'static-ecmp'
        materialized_value: "static-ecmp"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: ECMP_GATEWAY
        sample_class: positive_function
        description: "接口默认网关生成的路由形成等价路由。"
        representative_values: ["gateway-ecmp"]
        expr: 'gateway-ecmp'
        materialized_value: "gateway-ecmp"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-RT-ECMP-LOAD-BALANCE
    factor_name: 等价路由负载分担
    factor_kind: data
    design_role: driver
    owner_object: OBJ-RT-ECMP
    domain_model: enum
    value_type: enum
    values: [per-flow-default, per-flow-weighted]
    display_values:
      per-flow-default: 按流默认分担
      per-flow-weighted: 按流权重分担
    aliases: [ECMP分担, 负载分担, load_balance]
    applicable_when: "FAC-RT-ECMP-ROUTE-TYPE selected"
    downstream_methods: [P-Parameter]
    reuse_policy: must_reuse
    status: candidate
    notes: "静态路由 ECMP 只支持按流分担，无权重（等分）。"
    sample_definitions:
      - sample_id: ECMP_LB_DEFAULT
        sample_class: positive_function
        description: "按流等分分担。所有链路均分流量。"
        representative_values: ["per-flow-default"]
        expr: 'per-flow-default'
        materialized_value: "per-flow-default"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-RT-ECMP-LINK-CHANGE
    factor_name: 等价路由链路变更
    factor_kind: control
    design_role: driver
    owner_object: OBJ-RT-ECMP
    domain_model: enum
    value_type: enum
    values: [add-route, remove-route, disable-if, enable-if, cable-unplug-plug]
    display_values:
      add-route: 新增成员路由
      remove-route: 删除成员路由
      disable-if: 禁用成员出接口
      enable-if: 启用成员出接口
      cable-unplug-plug: 拔插成员接口网线
    aliases: [ECMP链路变更, 成员变更]
    applicable_when: "FAC-RT-ECMP-ROUTE-TYPE selected"
    downstream_methods: [P-Parameter, S-State]
    reuse_policy: must_reuse
    status: candidate
    notes: "链路变更后 ECMP 自动调整成员列表。新增加入分担，减少退出分担。"
    sample_definitions:
      - sample_id: ECMP_ADD
        sample_class: positive_function
        description: "新增成员路由，新成员加入分担。"
        representative_values: ["add-route"]
        expr: 'add-route'
        materialized_value: "add-route"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: ECMP_REMOVE
        sample_class: positive_function
        description: "删除成员路由，被删除的不再分担。"
        representative_values: ["remove-route"]
        expr: 'remove-route'
        materialized_value: "remove-route"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-RT-ECMP-ROUTE-SWITCH
    factor_name: ECMP 与高优先级路由切换
    factor_kind: control
    design_role: driver
    owner_object: OBJ-RT-ECMP
    domain_model: enum
    value_type: enum
    values: [higher-priority-overrides, higher-priority-removed, promote-member, demote-member]
    display_values:
      higher-priority-overrides: 高优先级覆盖ECMP
      higher-priority-removed: 删除高优先级恢复ECMP
      promote-member: ECMP成员升级为最高
      demote-member: 降级回到ECMP
    aliases: [ECMP切换, ECMP路由切换]
    applicable_when: "FAC-RT-ECMP-ROUTE-TYPE selected"
    downstream_methods: [P-Parameter, S-State]
    reuse_policy: must_reuse
    status: candidate
    notes: "高优先级路由优先于 ECMP，删除高优先级后 ECMP 恢复。"
    sample_definitions:
      - sample_id: ECMP_OVERRIDE
        sample_class: positive_function
        description: "新增更高优先级路由，ECMP 全部失效。"
        representative_values: ["higher-priority-overrides"]
        expr: 'higher-priority-overrides'
        materialized_value: "higher-priority-overrides"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: ECMP_RESTORE
        sample_class: positive_function
        description: "删除高优先级路由，ECMP 恢复。"
        representative_values: ["higher-priority-removed"]
        expr: 'higher-priority-removed'
        materialized_value: "higher-priority-removed"
        applicability: {config_test: not_applicable, function_test: positive}

  # ═══════════════════════════════════════════════════════
  # 直连路由
  # ═══════════════════════════════════════════════════════

  - factor_id: FAC-RT-DIRECT-MULTI-IP
    factor_name: 接口多IP直连路由
    factor_kind: data
    design_role: driver
    owner_object: OBJ-RT-DIRECT-ROUTE
    domain_model: enum
    value_type: enum
    values: [single-ip, multi-ip, partial-delete]
    display_values:
      single-ip: 单IP
      multi-ip: 多IP
      partial-delete: 部分删除
    aliases: [多IP, 接口多地址]
    applicable_when: always
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    notes: "接口配置多个IP时，每个IP均生成直连路由。删除部分IP后仅对应路由消失。"
    sample_definitions:
      - sample_id: DIR_MULTI_ALL
        sample_class: positive_function
        description: "接口多个IP均生成直连路由。"
        representative_values: ["multi-ip"]
        expr: 'multi-ip'
        materialized_value: "multi-ip"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: DIR_MULTI_DELETE
        sample_class: positive_function
        description: "删除部分IP，仅删除的IP对应路由消失。"
        representative_values: ["partial-delete"]
        expr: 'partial-delete'
        materialized_value: "partial-delete"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-RT-DIRECT-MEMBER-STATE
    factor_name: 逻辑接口成员状态
    factor_kind: state
    design_role: driver
    owner_object: OBJ-RT-DIRECT-ROUTE
    domain_model: state
    value_type: state
    values: [partial-down, all-down, partial-up]
    display_values:
      partial-down: 部分成员Down
      all-down: 全部成员Down
      partial-up: 部分成员恢复
    aliases: [成员状态, 聚合成员, BVI成员]
    applicable_when: "interface is aggregate or bvi"
    downstream_methods: [S-State]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      仅适用于逻辑接口(聚合/BVI)。部分成员 Down → 路由保持；全部成员 Down → 路由消失。
    sample_definitions:
      - sample_id: DIR_MEMBER_PARTIAL_DOWN
        sample_class: positive_function
        description: "部分成员 Down，直连路由仍然存在。"
        representative_values: ["partial-down"]
        expr: 'partial-down'
        materialized_value: "partial-down"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: DIR_MEMBER_ALL_DOWN
        sample_class: negative_function
        description: "全部成员 Down，接口失效，直连路由消失。"
        representative_values: ["all-down"]
        expr: 'all-down'
        materialized_value: "all-down"
        applicability: {config_test: not_applicable, function_test: negative}
      - sample_id: DIR_MEMBER_PARTIAL_UP
        sample_class: positive_function
        description: "部分成员恢复 UP，直连路由保持。"
        representative_values: ["partial-up"]
        expr: 'partial-up'
        materialized_value: "partial-up"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-RT-DIRECT-LOGIC-INTF-LIFECYCLE
    factor_name: 逻辑接口生命周期
    factor_kind: state
    design_role: driver
    owner_object: OBJ-RT-DIRECT-ROUTE
    domain_model: state
    value_type: state
    values: [create, delete]
    display_values:
      create: 创建
      delete: 删除
    aliases: [逻辑接口增删]
    applicable_when: "interface is aggregate or bvi or sub-interface"
    downstream_methods: [S-State]
    reuse_policy: must_reuse
    status: candidate
    notes: "创建逻辑接口并配IP → 生成直连路由；删除逻辑接口 → 路由消失。"
    sample_definitions:
      - sample_id: DIR_LOGIC_CREATE
        sample_class: positive_function
        description: "创建逻辑接口并配置IP，生成直连路由。"
        representative_values: ["create"]
        expr: 'create'
        materialized_value: "create"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: DIR_LOGIC_DELETE
        sample_class: negative_function
        description: "删除逻辑接口，该接口的直连路由全部消失。"
        representative_values: ["delete"]
        expr: 'delete'
        materialized_value: "delete"
        applicability: {config_test: not_applicable, function_test: negative}

