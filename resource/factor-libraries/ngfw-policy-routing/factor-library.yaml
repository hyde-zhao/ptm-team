constraints:
  - constraint_id: C-L3-EGRESS-001
    description: 下一跳模式使用下一跳关联接口类型
    if: "FAC-L3-EGRESS-MODE == next-hop"
    require: [FAC-L3-NH-IF-TYPE]
    forbid: [FAC-L3-OUTIF-TYPE]
  - constraint_id: C-L3-EGRESS-002
    description: 出接口模式使用出接口接口类型
    if: "FAC-L3-EGRESS-MODE == out-interface"
    require: [FAC-L3-OUTIF-TYPE]
    forbid: [FAC-L3-NH-IF-TYPE]
  - constraint_id: C-L3-EGRESS-003
    description: 下一跳模式支持的接口类型
    if: "FAC-L3-EGRESS-MODE == next-hop"
    allowed_values:
      FAC-L3-NH-IF-TYPE: [physical, sub-interface, aggregate, bvi, tunnel]
  - constraint_id: C-L3-EGRESS-004
    description: 出接口模式支持的接口类型
    if: "FAC-L3-EGRESS-MODE == out-interface"
    allowed_values:
      FAC-L3-OUTIF-TYPE: [tunnel, pppoe]
  - constraint_id: C-L3-EGRESS-005
    description: 失效检测方式只在不可达场景展开
    if: "FAC-L3-REACHABILITY == unreachable"
    require: [FAC-L3-FAIL-DETECT-METHOD]
  - constraint_id: C-CONFIG-VS-FUNCTION-001
    description: 配置拒绝样本不得作为功能用例前置
    if: "sample.applicability.config_test == rejected"
    forbid_usage:
      function_test: [precondition, positive, negative]
  - constraint_id: C-TRAFFIC-001
    description: 功能反向流量不是配置非法值
    if: "sample_class == negative_function"
    require_usage:
      function_test: negative
    forbid_usage:
      config_test: [accepted, rejected]
  - constraint_id: C-RUNTIME-VS-CONFIG-001
    description: 报文运行时输入因子不参与配置合法性覆盖
    if: "owner_object == OBJ-PR-TRAFFIC and factor_id starts_with FAC-PKT-"
    require_usage:
      config_test: not_applicable
    forbid_usage:
      config_test: [accepted, rejected]
  - constraint_id: C-RULE-CONFIG-001
    description: 规则配置字段合法性由 OBJ-PR-RULE 配置因子承载
    if: "config_test in [accepted, rejected] for source/destination/service fields"
    require_owner_object: OBJ-PR-RULE
    forbid_owner_object: OBJ-PR-TRAFFIC

capability_matrices:
  - matrix_id: M-L3-EGRESS-INTERFACE
    matrix_name: 策略路由三层转发出口接口能力矩阵
    rows:
      - egress_mode: next-hop
        interface_factor: FAC-L3-NH-IF-TYPE
        interface_type: physical
        display: 物理口
        valid: true
      - egress_mode: next-hop
        interface_factor: FAC-L3-NH-IF-TYPE
        interface_type: sub-interface
        display: 子接口
        valid: true
      - egress_mode: next-hop
        interface_factor: FAC-L3-NH-IF-TYPE
        interface_type: aggregate
        display: 聚合口
        valid: true
      - egress_mode: next-hop
        interface_factor: FAC-L3-NH-IF-TYPE
        interface_type: bvi
        display: BVI接口
        valid: true
      - egress_mode: next-hop
        interface_factor: FAC-L3-NH-IF-TYPE
        interface_type: tunnel
        display: 隧道口
        valid: true
      - egress_mode: out-interface
