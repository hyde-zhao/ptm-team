        interface_type: pppoe
        display: PPPoE接口
        valid: true

factor_groups:
  - group_id: L3_EGRESS_NEXT_HOP
    group_name: 下一跳模式三层转发接口覆盖
    factors: [FAC-L3-EGRESS-MODE, FAC-L3-NH-IF-TYPE, FAC-L3-IF-CAPABILITY, FAC-L3-REACHABILITY, FAC-L3-EXPECTED-FWD-PATH]
    fixed_values:
      FAC-L3-EGRESS-MODE: next-hop
    coverage_strategy:
      positive: FAC-L3-NH-IF-TYPE 每个有效接口类型至少覆盖一次
      failover: 选择物理口和隧道口作为代表覆盖不可达/恢复，除非风险要求全覆盖
      oracle: 转发路径必须能证明走策略路由下一跳
  - group_id: L3_EGRESS_OUT_INTERFACE
    group_name: 出接口模式三层转发接口覆盖
    factors: [FAC-L3-EGRESS-MODE, FAC-L3-OUTIF-TYPE, FAC-L3-IF-CAPABILITY, FAC-L3-REACHABILITY, FAC-L3-EXPECTED-FWD-PATH]
    fixed_values:
      FAC-L3-EGRESS-MODE: out-interface
    coverage_strategy:
      positive: FAC-L3-OUTIF-TYPE 中隧道口和 PPPoE 接口均必须覆盖
      failover: 隧道口和 PPPoE 接口都建议覆盖 Down/恢复，因为状态机制不同
      oracle: 转发路径必须能证明走配置的出接口
  - group_id: L3_EGRESS_FAILOVER
    group_name: 出口不可达和故障恢复
    factors: [FAC-L3-EGRESS-MODE, FAC-L3-REACHABILITY, FAC-L3-FAIL-DETECT-METHOD, FAC-L3-EXPECTED-FWD-PATH]
    coverage_strategy:
      positive: 可达状态确认策略转发
      negative: IP-LINK 和接口Down 均覆盖
      recovery: 恢复后验证重新参与转发或按产品定义处理
  - group_id: TRAFFIC_MATCHING
    group_name: 策略路由业务流量匹配性
    factors: [FAC-TRAFFIC-LAYER-TYPE, FAC-TRAFFIC-IP-MATCH, FAC-TRAFFIC-SERVICE-MATCH, FAC-TRAFFIC-APP-MATCH, FAC-EXPECTED-MATCH-RESULT]
    usage_profiles:
      config_test:
        policy: not_applicable
      function_test:
        positive_samples: [TRAFFIC_L2_NON_IP_MATCH, TRAFFIC_IP_MATCH, TRAFFIC_TCP_MATCH, TRAFFIC_UDP_MATCH, TRAFFIC_FTP_MATCH, TRAFFIC_HTTP_MATCH, TRAFFIC_OTHER_APP_MATCH]
        negative_samples: [TRAFFIC_SRC_IP_MISMATCH, TRAFFIC_DST_IP_MISMATCH, TRAFFIC_SERVICE_TYPE_MISMATCH, TRAFFIC_SRC_PORT_MISMATCH, TRAFFIC_DST_PORT_MISMATCH, TRAFFIC_APP_MISMATCH]
  - group_id: CONFIG_FIELD_VALIDITY
    group_name: 策略路由配置字段合法性
    factors: [FAC-CONFIG-NAME, FAC-PR-RULE-SRC-IP, FAC-PR-RULE-DST-IP, FAC-PR-RULE-PROTOCOL, FAC-PR-RULE-SRC-PORT, FAC-PR-RULE-DST-PORT, FAC-L3-NH-WEIGHT]
    usage_profiles:
      config_test:
        policy: accepted_rejected_required
      function_test:
        policy: accepted_samples_only_as_precondition
    coverage_strategy:
      positive: 每个配置字段至少选择一个 accepted 样本作为可下发配置
      negative: 每个配置字段的 rejected 样本只验证配置拒绝
      boundary: range/string_pattern 字段必须覆盖边界最小值、边界最大值和越界值
  - group_id: POLICY_RULE_ORDER
    group_name: 策略路由重叠规则命中判定
    factors: [FAC-PR-RULE-ORDER, FAC-PR-RULE-SCOPE, FAC-PR-RULE-STATE, FAC-PR-EXPECTED-HIT-RULE]
    coverage_strategy:
      parameter: 使用判定表覆盖顺序、范围、启用状态与预期命中规则
  - group_id: DFX_COUNTER
    group_name: 命中计数展示和清零
    factors: [FAC-COUNTER-TARGET, FAC-COUNTER-ACTION, FAC-COUNTER-DELTA]
    coverage_strategy:
      data: 覆盖查看、单条清零、全部清零、清零后重新增加
  - group_id: DFX_LOG_AUDIT
    group_name: 操作日志审计
    factors: [FAC-LOG-OP-TYPE, FAC-LOG-FIELD-COMPLETENESS]
    coverage_strategy:
      data: 覆盖新增、修改、启用、禁用、删除及字段完整性
  - group_id: HA_POLICY_ROUTE
    group_name: 策略路由HA同步与切换
    factors: [FAC-HA-ROLE, FAC-HA-SYNC-STATE, FAC-HA-FAILOVER-ACTION, FAC-HA-EXPECTED-ACTIVE-DEVICE]
    coverage_strategy:
      state: 覆盖主备同步、主故障切换、恢复与回切
