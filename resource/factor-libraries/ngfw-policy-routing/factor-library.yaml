# NGFW 策略路由因子库
# 研究区 — ngfw-policy-routing
# 策略路由专属因子。公共因子已迁移到 ngfw-objects, ngfw-traffic, ngfw-ipv4-route, ngfw-ha, ngfw-dfx, common-network。

schema_version: 1
library_id: ngfw-policy-routing
version: 0.2.0
status: candidate
description: "NGFW 策略路由专属因子库。覆盖规则匹配字段、流量匹配状态、规则顺序和结果判定。"

factors:

  # ═══════════════════════════════════════════════════════
  # 规则匹配字段 — 引用型
  # ═══════════════════════════════════════════════════════

  - factor_id: FAC-PR-RULE-IN-INTERFACE
    factor_name: 策略路由规则入接口
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: object_instance
    value_type: string
    domain_expr:
      object_type: interface_name
      default_value: any
      stored_in: topology.interfaces
    aliases: [入接口, 匹配入接口, incoming_interface]
    applicable_when: "policy route rule incoming interface configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: PR_IN_IF_ANY
        sample_class: valid_config
        description: "不指定入接口，匹配所有。默认值 any。"
        representative_values: ["any"]
        expr: 'any'
        materialized_value: "any"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_IN_IF_EXISTING
        sample_class: valid_config
        description: "指定设备上存在的接口名称。"
        representative_values: ["GE0", "GE1"]
        expr: 'from_topology.interfaces.any'
        materialized_value: "GE0"
        applicability: {config_test: accepted, function_test: prefered_precondition}
      - sample_id: PR_IN_IF_NOT_EXIST
        sample_class: invalid_config
        description: "指定设备上不存在的接口名称。配置应被拒绝。"
        representative_values: ["GE999", "not_exist_if"]
        expr: 'from_topology.interfaces.nonexistent'
        materialized_value: "GE999"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PR_IN_IF_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。复用 FAC-CONFIG-NAME 的无效格式。"
        representative_values: [""]
        expr: 'from_factor(common-network/FAC-CONFIG-NAME).rejected'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [PR_IN_IF_ANY, PR_IN_IF_EXISTING]
        rejected_config_samples: [PR_IN_IF_NOT_EXIST, PR_IN_IF_NAME_INVALID]
      function_test:
        precondition_samples: [PR_IN_IF_EXISTING]

  - factor_id: FAC-PR-RULE-SRC-NETWORK
    factor_name: 策略路由规则源网络
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: object_instance
    value_type: string
    domain_expr:
      reference:
        default: any
        switch:
          field: source_network_is_group
          cases:
            false: ngfw-objects/FAC-OBJ-ADDRESS
            true: ngfw-objects/FAC-OBJ-ADDRESS-GROUP
    aliases: [源网络, 源地址, source_network, src_network]
    applicable_when: "policy route rule source network configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: PR_SRC_NET_ANY
        sample_class: valid_config
        description: "不指定源网络，匹配所有。默认值 any。"
        representative_values: ["any"]
        expr: 'any'
        materialized_value: "any"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_SRC_NET_ADDR_VALID
        sample_class: valid_config
        description: "is_group=false。引用设备上已存在的地址对象。"
        representative_values: ["office_net", "dmz_servers"]
        expr: 'from_target(is_group=false).accepted'
        materialized_value: "office_net"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_SRC_NET_GROUP_VALID
        sample_class: valid_config
        description: "is_group=true。引用设备上已存在的地址组。"
        representative_values: ["internal_networks"]
        expr: 'from_target(is_group=true).accepted'
        materialized_value: "internal_networks"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_SRC_NET_ADDR_NOT_EXIST
        sample_class: invalid_config
        description: "is_group=false。设备上不存在的地址对象名称。"
        representative_values: ["not_exist_addr"]
        expr: 'from_target(is_group=false).invalid_config'
        materialized_value: "not_exist_addr"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PR_SRC_NET_GROUP_NOT_EXIST
        sample_class: invalid_config
        description: "is_group=true。设备上不存在的地址组名称。"
        representative_values: ["not_exist_group"]
        expr: 'from_target(is_group=true).invalid_config'
        materialized_value: "not_exist_group"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PR_SRC_NET_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。复用 FAC-CONFIG-NAME 的无效格式。"
        representative_values: [""]
        expr: 'from_target().invalid_format'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [PR_SRC_NET_ANY, PR_SRC_NET_ADDR_VALID, PR_SRC_NET_GROUP_VALID]
        rejected_config_samples: [PR_SRC_NET_ADDR_NOT_EXIST, PR_SRC_NET_GROUP_NOT_EXIST, PR_SRC_NET_NAME_INVALID]
      function_test:
        precondition_samples: [PR_SRC_NET_ADDR_VALID]

  - factor_id: FAC-PR-RULE-DST-NETWORK
    factor_name: 策略路由规则目的网络
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: object_instance
    value_type: string
    domain_expr:
      reference:
        default: any
        switch:
          field: destination_network_is_group
          cases:
            false: ngfw-objects/FAC-OBJ-ADDRESS
            true: ngfw-objects/FAC-OBJ-ADDRESS-GROUP
    aliases: [目的网络, 目的地址, dst_network]
    applicable_when: "policy route rule destination network configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: PR_DST_NET_ANY
        sample_class: valid_config
        description: "不指定目的网络，匹配所有。默认值 any。"
        representative_values: ["any"]
        expr: 'any'
        materialized_value: "any"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_DST_NET_ADDR_VALID
        sample_class: valid_config
        description: "is_group=false。引用设备上已存在的地址对象。"
        representative_values: ["web_servers"]
        expr: 'from_target(is_group=false).accepted'
        materialized_value: "web_servers"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_DST_NET_GROUP_VALID
        sample_class: valid_config
        description: "is_group=true。引用设备上已存在的地址组。"
        representative_values: ["partner_networks"]
        expr: 'from_target(is_group=true).accepted'
        materialized_value: "partner_networks"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_DST_NET_ADDR_NOT_EXIST
        sample_class: invalid_config
        description: "is_group=false。设备上不存在的地址对象名称。"
        representative_values: ["not_exist_dst"]
        expr: 'from_target(is_group=false).invalid_config'
        materialized_value: "not_exist_dst"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PR_DST_NET_GROUP_NOT_EXIST
        sample_class: invalid_config
        description: "is_group=true。设备上不存在的地址组名称。"
        representative_values: ["not_exist_dst_group"]
        expr: 'from_target(is_group=true).invalid_config'
        materialized_value: "not_exist_dst_group"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PR_DST_NET_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。"
        representative_values: [""]
        expr: 'from_target().invalid_format'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [PR_DST_NET_ANY, PR_DST_NET_ADDR_VALID, PR_DST_NET_GROUP_VALID]
        rejected_config_samples: [PR_DST_NET_ADDR_NOT_EXIST, PR_DST_NET_GROUP_NOT_EXIST, PR_DST_NET_NAME_INVALID]
      function_test:
        precondition_samples: [PR_DST_NET_ADDR_VALID]

  - factor_id: FAC-PR-RULE-SERVICE
    factor_name: 策略路由规则服务
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: object_instance
    value_type: string
    domain_expr:
      reference:
        default: any
        switch:
          field: service_is_group
          cases:
            false: ngfw-objects/FAC-OBJ-SERVICE
            true: ngfw-objects/FAC-OBJ-SERVICE-GROUP
    aliases: [服务, 服务对象, service]
    applicable_when: "policy route rule service configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: PR_SVC_ANY
        sample_class: valid_config
        description: "不指定服务，匹配所有。"
        representative_values: ["any"]
        expr: 'any'
        materialized_value: "any"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_SVC_VALID
        sample_class: valid_config
        description: "is_group=false。引用已存在的服务对象。"
        representative_values: ["服务0001", "web_service"]
        expr: 'from_target(is_group=false).accepted'
        materialized_value: "服务0001"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_SVC_GROUP_VALID
        sample_class: valid_config
        description: "is_group=true。引用已存在的服务组。"
        representative_values: ["common_services"]
        expr: 'from_target(is_group=true).accepted'
        materialized_value: "common_services"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_SVC_NOT_EXIST
        sample_class: invalid_config
        description: "设备上不存在的服务/服务组名称。"
        representative_values: ["not_exist_svc"]
        expr: 'from_target().invalid_config'
        materialized_value: "not_exist_svc"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PR_SVC_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。"
        representative_values: [""]
        expr: 'from_target().invalid_format'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [PR_SVC_ANY, PR_SVC_VALID, PR_SVC_GROUP_VALID]
        rejected_config_samples: [PR_SVC_NOT_EXIST, PR_SVC_NAME_INVALID]
      function_test:
        precondition_samples: [PR_SVC_VALID]

  - factor_id: FAC-PR-RULE-APP-LIST
    factor_name: 策略路由规则应用列表
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: object_instance
    value_type: string
    domain_expr:
      reference:
        default: []
        target: ngfw-objects/FAC-OBJ-APPLICATION
      list: true
    aliases: [应用列表, applist, application_list]
    applicable_when: "policy route rule application configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: PR_APP_LIST_EMPTY
        sample_class: valid_config
        description: "空列表，不限制应用。"
        representative_values: ["[]"]
        expr: 'empty_list'
        materialized_value: "[]"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_APP_LIST_VALID
        sample_class: valid_config
        description: "列表中全部是设备上已存在的应用对象。"
        representative_values: ["['tcp应用', 'test']"]
        expr: 'from_target().accepted'
        materialized_value: "['tcp应用']"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_APP_LIST_PARTIAL_INVALID
        sample_class: invalid_config
        description: "列表中存在设备上不存在的应用对象名称。"
        representative_values: ["['tcp应用', 'not_exist_app']"]
        expr: 'from_target().accepted + from_target().invalid_config'
        materialized_value: "['tcp应用', 'not_exist_app']"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PR_APP_LIST_NAME_INVALID
        sample_class: invalid_format
        description: "列表中存在格式非法的名称。"
        representative_values: ["['', 'tcp应用']"]
        expr: 'from_target().invalid_format'
        materialized_value: "['']"
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [PR_APP_LIST_EMPTY, PR_APP_LIST_VALID]
        rejected_config_samples: [PR_APP_LIST_PARTIAL_INVALID, PR_APP_LIST_NAME_INVALID]
      function_test:
        precondition_samples: [PR_APP_LIST_VALID]

  - factor_id: FAC-PR-RULE-APP-TAG
    factor_name: 策略路由规则应用标签
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: object_instance
    value_type: string
    domain_expr:
      reference:
        target: ngfw-objects/FAC-OBJ-APP-TAG
    aliases: [应用标签, app_tag, apptag]
    applicable_when: "policy route rule application tag configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: PR_APP_TAG_VALID
        sample_class: valid_config
        description: "引用设备上已存在的应用标签。"
        representative_values: ["web_apps", "blocked_apps"]
        expr: 'from_target().accepted'
        materialized_value: "web_apps"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_APP_TAG_NOT_EXIST
        sample_class: invalid_config
        description: "设备上不存在的应用标签名称。"
        representative_values: ["not_exist_tag"]
        expr: 'from_target().invalid_config'
        materialized_value: "not_exist_tag"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PR_APP_TAG_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。"
        representative_values: [""]
        expr: 'from_target().invalid_format'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [PR_APP_TAG_VALID]
        rejected_config_samples: [PR_APP_TAG_NOT_EXIST, PR_APP_TAG_NAME_INVALID]
      function_test:
        precondition_samples: [PR_APP_TAG_VALID]

  - factor_id: FAC-PR-RULE-TIME-OBJ
    factor_name: 策略路由规则时间对象
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: object_instance
    value_type: string
    domain_expr:
      reference:
        target: ngfw-objects/FAC-OBJ-TIME
    domain_expr:
      reference:
        default: any
        target: ngfw-objects/FAC-OBJ-TIME
    aliases: [时间对象, time_obj, 时间计划]
    applicable_when: "policy route rule time object configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: PR_TIME_ANY
        sample_class: valid_config
        description: "不指定时间对象，规则始终生效。默认值。"
        representative_values: ["any"]
        expr: 'any'
        materialized_value: "any"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_TIME_VALID
        sample_class: valid_config
        description: "引用设备上已存在的时间对象。"
        representative_values: ["work_hours", "maintenance_window"]
        expr: 'from_target().accepted'
        materialized_value: "work_hours"
        applicability: {config_test: accepted, function_test: precondition}
      - sample_id: PR_TIME_NOT_EXIST
        sample_class: invalid_config
        description: "设备上不存在的时间对象名称。"
        representative_values: ["not_exist_time"]
        expr: 'from_target().invalid_config'
        materialized_value: "not_exist_time"
        applicability: {config_test: rejected, function_test: not_applicable}
      - sample_id: PR_TIME_NAME_INVALID
        sample_class: invalid_format
        description: "名称格式非法。"
        representative_values: [""]
        expr: 'from_target().invalid_format'
        materialized_value: ""
        applicability: {config_test: rejected, function_test: not_applicable}
    usage_profiles:
      config_test:
        accepted_config_samples: [PR_TIME_ANY, PR_TIME_VALID]
        rejected_config_samples: [PR_TIME_NOT_EXIST, PR_TIME_NAME_INVALID]
      function_test:
        precondition_samples: [PR_TIME_VALID]

  # ═══════════════════════════════════════════════════════
  # 规则状态与顺序
  # ═══════════════════════════════════════════════════════

  - factor_id: FAC-PR-RULE-STATE
    factor_name: 策略路由规则状态
    factor_kind: state
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: state
    value_type: state
    values: [enabled, disabled, modified, deleted]
    display_values:
      enabled: 启用
      disabled: 禁用
      modified: 已修改
      deleted: 已删除
    aliases: [规则状态, 启用禁用]
    applicable_when: always
    downstream_methods: [S-State]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: RULE_ENABLED
        sample_class: positive_function
        description: "规则已启用，正常参与匹配。"
        representative_values: ["enabled"]
        expr: 'enabled'
        materialized_value: "enabled"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: RULE_DISABLED
        sample_class: negative_function
        description: "规则已禁用，不参与匹配。"
        representative_values: ["disabled"]
        expr: 'disabled'
        materialized_value: "disabled"
        applicability: {config_test: not_applicable, function_test: negative}

  - factor_id: FAC-PR-RULE-EFFECTIVE-STATE
    factor_name: 策略路由规则生效状态
    factor_kind: state
    design_role: oracle
    owner_object: OBJ-PR-RULE
    domain_model: enum
    value_type: enum
    values: [active, inactive]
    display_values:
      active: 生效中
      inactive: 未生效
    aliases: [生效状态, 运行时状态, effective_state]
    applicable_when: "FAC-PR-RULE-STATE == enabled"
    downstream_methods: [S-State, oracle-design]
    reuse_policy: must_reuse
    status: candidate
    notes: >
      规则配置存在且启用(enabled)时，是否实际参与报文匹配由运行时条件决定:
      - 引用时间对象时，当前时间在窗口内 → active，窗口外 → inactive
      - 引用入接口时，接口状态 UP → 才可能 active
      - 未引用时间对象和入接口(any) → 始终 active
      inactive 状态的规则不会产生命中计数，不会出现在转发表中。
    sample_definitions:
      - sample_id: EFFECTIVE_ACTIVE
        sample_class: positive_function
        description: "规则生效中。当前时间在时间对象窗口内（或未引用），报文可匹配该规则。"
        representative_values: ["active"]
        expr: 'active'
        materialized_value: "active"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: EFFECTIVE_INACTIVE
        sample_class: negative_function
        description: "规则未生效。如时间对象窗口外，规则存在但不参与匹配。"
        representative_values: ["inactive"]
        expr: 'inactive'
        materialized_value: "inactive"
        applicability: {config_test: not_applicable, function_test: negative}

  - factor_id: FAC-PR-RULE-ORDER
    factor_name: 策略路由规则顺序
    factor_kind: control
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: enum
    value_type: enum
    values: [specific-before-general, general-before-specific, moved-order, default-insert-position]
    display_values:
      specific-before-general: 精确规则在前
      general-before-specific: 通用规则在前
      moved-order: 移动后顺序
      default-insert-position: 默认插入位置
    aliases: [规则顺序, 优先级顺序]
    applicable_when: always
    downstream_methods: [P-Parameter, C-Combination]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: ORDER_SPECIFIC_FIRST
        sample_class: positive_function
        description: "精确规则在前，优先命中精确规则。"
        representative_values: ["specific-before-general"]
        expr: 'specific-before-general'
        materialized_value: "specific-before-general"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: ORDER_GENERAL_FIRST
        sample_class: negative_function
        description: "通用规则在前，可能遮蔽精确规则。"
        representative_values: ["general-before-specific"]
        expr: 'general-before-specific'
        materialized_value: "general-before-specific"
        applicability: {config_test: not_applicable, function_test: negative}

  - factor_id: FAC-PR-RULE-SCOPE
    factor_name: 策略路由规则匹配范围
    factor_kind: control
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: enum
    value_type: enum
    values: [specific, general, overlap]
    display_values:
      specific: 精确范围
      general: 通用范围
      overlap: 重叠范围
    aliases: [规则范围, 匹配范围]
    applicable_when: always
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: SCOPE_SPECIFIC
        sample_class: valid_member
        description: "精确匹配范围。如 /32 主机路由。"
        representative_values: ["specific"]
        expr: 'specific'
        materialized_value: "specific"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: SCOPE_OVERLAP
        sample_class: valid_member
        description: "两条规则 IP 范围有重叠。"
        representative_values: ["overlap"]
        expr: 'overlap'
        materialized_value: "overlap"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-PR-EXPECTED-HIT-RULE
    factor_name: 预期命中规则
    factor_kind: oracle
    design_role: oracle
    owner_object: OBJ-PR-RULE
    domain_model: enum
    value_type: enum
    values: [rule-a, rule-b, none]
    display_values:
      rule-a: 命中规则A
      rule-b: 命中规则B
      none: 不命中任何策略路由规则
    aliases: [命中规则, 预期规则]
    applicable_when: "multiple overlapping rules"
    downstream_methods: [oracle-design]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: HIT_RULE_A
        sample_class: positive_function
        description: "预期命中规则A。"
        representative_values: ["rule-a"]
        expr: 'rule-a'
        materialized_value: "rule-a"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: HIT_NONE
        sample_class: negative_function
        description: "预期不命中任何策略路由规则。"
        representative_values: ["none"]
        expr: 'none'
        materialized_value: "none"
        applicability: {config_test: not_applicable, function_test: negative}

  # ═══════════════════════════════════════════════════════
  # 流量匹配语义
  # ═══════════════════════════════════════════════════════

  - factor_id: FAC-TRAFFIC-LAYER-TYPE
    factor_name: 流量层级类型
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    domain_expr:
      reference_targets:
        l2-non-ip: [ngfw-traffic/FAC-PKT-L2-DMAC, ngfw-traffic/FAC-PKT-L2-SMAC]
        ip: [ngfw-traffic/FAC-PKT-SRC-IP, ngfw-traffic/FAC-PKT-DST-IP]
        tcp: [ngfw-traffic/FAC-PKT-SRC-IP, ngfw-traffic/FAC-PKT-DST-IP, ngfw-traffic/FAC-PKT-PROTOCOL]
        udp: [ngfw-traffic/FAC-PKT-SRC-IP, ngfw-traffic/FAC-PKT-DST-IP, ngfw-traffic/FAC-PKT-PROTOCOL]
        application: [ngfw-traffic/FAC-PKT-APP-ID]
    values: [l2-non-ip, ip, tcp, udp, application]
    display_values:
      l2-non-ip: 二层非IP流
      ip: IP流
      tcp: TCP流
      udp: UDP流
      application: 应用流
    aliases: [业务流类型, 流量类型, 报文类型]
    downstream_methods: [C-Combination]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: LAYER_IP
        sample_class: positive_function
        description: "纯IP流匹配。"
        representative_values: ["ip"]
        expr: 'ip'
        materialized_value: "ip"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: LAYER_TCP
        sample_class: positive_function
        description: "TCP流匹配，可进一步匹配端口。"
        representative_values: ["tcp"]
        expr: 'tcp'
        materialized_value: "tcp"
        applicability: {config_test: not_applicable, function_test: positive}

  - factor_id: FAC-TRAFFIC-IP-MATCH
    factor_name: IP 匹配状态
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    domain_expr:
      reference_targets: [ngfw-traffic/FAC-PKT-SRC-IP, ngfw-traffic/FAC-PKT-DST-IP]
    values: [src-dst-match, src-ip-mismatch, dst-ip-mismatch, both-ip-mismatch]
    display_values:
      src-dst-match: 源IP和目的IP均匹配
      src-ip-mismatch: 源IP不匹配
      dst-ip-mismatch: 目的IP不匹配
      both-ip-mismatch: 源IP和目的IP均不匹配
    aliases: [IP匹配, 地址匹配状态]
    downstream_methods: [P-Parameter, C-Combination]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: IP_MATCH
        sample_class: positive_function
        description: "源IP和目的IP均匹配规则。期望 hit。"
        representative_values: ["src-dst-match"]
        expr: 'src-dst-match'
        materialized_value: "src-dst-match"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: IP_MISMATCH
        sample_class: negative_function
        description: "IP不匹配规则。期望 miss。"
        representative_values: ["src-ip-mismatch"]
        expr: 'src-ip-mismatch'
        materialized_value: "src-ip-mismatch"
        applicability: {config_test: not_applicable, function_test: negative}

  - factor_id: FAC-TRAFFIC-SERVICE-MATCH
    factor_name: 服务匹配状态
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    domain_expr:
      reference_targets: [ngfw-traffic/FAC-PKT-PROTOCOL, ngfw-traffic/FAC-PKT-SRC-PORT, ngfw-traffic/FAC-PKT-DST-PORT]
    values: [service-match, service-type-mismatch, src-port-mismatch, dst-port-mismatch]
    display_values:
      service-match: 服务类型和端口均匹配
      service-type-mismatch: 服务类型不匹配
      src-port-mismatch: 源端口不匹配
      dst-port-mismatch: 目的端口不匹配
    aliases: [服务匹配, 端口匹配, 协议端口匹配]
    downstream_methods: [P-Parameter, C-Combination]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: SVC_MATCH
        sample_class: positive_function
        description: "协议类型和端口均匹配。期望 hit。"
        representative_values: ["service-match"]
        expr: 'service-match'
        materialized_value: "service-match"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: SVC_MISMATCH
        sample_class: negative_function
        description: "服务不匹配。期望 miss。"
        representative_values: ["service-type-mismatch"]
        expr: 'service-type-mismatch'
        materialized_value: "service-type-mismatch"
        applicability: {config_test: not_applicable, function_test: negative}

  - factor_id: FAC-TRAFFIC-APP-MATCH
    factor_name: 应用匹配状态
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    domain_expr:
      reference_targets: [ngfw-traffic/FAC-PKT-APP-ID]
    values: [ftp-match, http-match, other-app-match, app-mismatch, app-unrecognized]
    display_values:
      ftp-match: FTP流
      http-match: HTTP流
      other-app-match: 其他应用流
      app-mismatch: 应用不匹配
      app-unrecognized: 应用未识别
    aliases: [应用匹配, 应用识别]
    downstream_methods: [P-Parameter, C-Combination]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: APP_MATCH
        sample_class: positive_function
        description: "应用匹配规则。期望 hit。"
        representative_values: ["ftp-match"]
        expr: 'ftp-match'
        materialized_value: "ftp-match"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: APP_MISMATCH
        sample_class: negative_function
        description: "应用不匹配。期望 miss。"
        representative_values: ["app-mismatch"]
        expr: 'app-mismatch'
        materialized_value: "app-mismatch"
        applicability: {config_test: not_applicable, function_test: negative}

  - factor_id: FAC-EXPECTED-MATCH-RESULT
    factor_name: 预期命中结果
    factor_kind: oracle
    design_role: oracle
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    values: [hit, miss]
    display_values:
      hit: 命中
      miss: 不命中
    aliases: [命中结果, 预期匹配结果]
    downstream_methods: [oracle-design]
    reuse_policy: must_reuse
    status: candidate
    sample_definitions:
      - sample_id: EXPECTED_HIT
        sample_class: positive_function
        description: "预期命中策略路由规则，报文按策略转发。"
        representative_values: ["hit"]
        expr: 'hit'
        materialized_value: "hit"
        applicability: {config_test: not_applicable, function_test: positive}
      - sample_id: EXPECTED_MISS
        sample_class: negative_function
        description: "预期不命中策略路由规则。"
        representative_values: ["miss"]
        expr: 'miss'
        materialized_value: "miss"
        applicability: {config_test: not_applicable, function_test: negative}

# ═══════════════════════════════════════════════════════
# 约束
# ═══════════════════════════════════════════════════════
constraints:
  - constraint_id: C-PR-NAME-001
    description: "所有引用型字段的名称格式非法由 common-network/FAC-CONFIG-NAME 统一定义"
    if: "sample_class == invalid_format and domain_model == object_instance"
    reuse: common-network/FAC-CONFIG-NAME.rejected

# ═══════════════════════════════════════════════════════
# 因子组
# ═══════════════════════════════════════════════════════
factor_groups:
  - group_id: PR_CONFIG_FIELD_VALIDITY
    group_name: 策略路由配置字段合法性
    factors:
      - FAC-PR-RULE-IN-INTERFACE
      - FAC-PR-RULE-SRC-NETWORK
      - FAC-PR-RULE-DST-NETWORK
      - FAC-PR-RULE-SERVICE
      - FAC-PR-RULE-APP-LIST
      - FAC-PR-RULE-APP-TAG
      - FAC-PR-RULE-TIME-OBJ
    external_factors:
      - factor_id: ngfw-objects/FAC-OBJ-ADDRESS
        role: "源/目的网络的地址对象引用"
      - factor_id: ngfw-objects/FAC-OBJ-ADDRESS-GROUP
        role: "源/目的网络的地址组引用"
      - factor_id: ngfw-objects/FAC-OBJ-SERVICE
        role: "服务对象引用"
      - factor_id: ngfw-objects/FAC-OBJ-SERVICE-GROUP
        role: "服务组引用"
      - factor_id: ngfw-objects/FAC-OBJ-APPLICATION
        role: "应用对象引用"
      - factor_id: ngfw-objects/FAC-OBJ-APP-TAG
        role: "应用标签引用"
      - factor_id: ngfw-objects/FAC-OBJ-TIME
        role: "时间对象引用"
      - factor_id: common-network/FAC-CONFIG-NAME
        role: "所有名称格式非法值"
    coverage_strategy:
      positive: "每个配置字段至少选择一个 accepted 样本"
      negative: "每个字段的 rejected 样本只验证配置拒绝"
      boundary: "组件型字段覆盖 switch 两个分支"

  - group_id: PR_RULE_ORDER
    group_name: 策略路由重叠规则命中判定
    factors: [FAC-PR-RULE-ORDER, FAC-PR-RULE-SCOPE, FAC-PR-RULE-STATE, FAC-PR-RULE-EFFECTIVE-STATE, FAC-PR-EXPECTED-HIT-RULE]
    coverage_strategy:
      parameter: 使用判定表覆盖顺序、范围、启用状态与预期命中规则

  - group_id: PR_TRAFFIC_MATCHING
    group_name: 策略路由业务流量匹配性
    depends_on:
      factor: ngfw-traffic/FAC-PKT-VALIDITY-MODE
      required_value: policy_match
    factors: [FAC-TRAFFIC-LAYER-TYPE, FAC-TRAFFIC-IP-MATCH,
              FAC-TRAFFIC-SERVICE-MATCH, FAC-TRAFFIC-APP-MATCH,
              FAC-EXPECTED-MATCH-RESULT]
    coverage_strategy:
      positive: 各层级正向匹配 + 命中
      negative: 各层级反向不匹配 + 不命中

# ═══════════════════════════════════════════════════════
# 被引用方反向记录
# ═══════════════════════════════════════════════════════
external_consumers: []
