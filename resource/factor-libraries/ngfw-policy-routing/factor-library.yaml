schema_version: 1
library_id: ngfw-policy-routing
version: 0.2.1
status: active
description: NGFW 策略路由公共因子库，覆盖三层转发出口、配置字段合法性、业务流量匹配、规则顺序、DFX 和 HA 场景。

factors:
  - factor_id: FAC-L3-EGRESS-MODE
    factor_name: 三层转发出口选择模式
    factor_kind: control
    design_role: driver
    owner_object: OBJ-PR-EGRESS
    domain_model: enum
    value_type: enum
    values: [next-hop, out-interface]
    display_values:
      next-hop: 下一跳
      out-interface: 出接口
    aliases: [出口模式, 转发出口类型, 三层转发出口类型]
    applicable_when: always
    downstream_methods: [P-Parameter, C-Combination]
    reuse_policy: must_reuse
    status: active

  - factor_id: FAC-L3-NH-IF-TYPE
    factor_name: 下一跳关联接口类型
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-EGRESS
    domain_model: enum
    value_type: enum
    values: [physical, sub-interface, aggregate, bvi, tunnel]
    display_values:
      physical: 物理口
      sub-interface: 子接口
      aggregate: 聚合口
      bvi: BVI接口
      tunnel: 隧道口
    aliases: [下一跳接口类型, 下一跳所在接口, 下一跳关联三层接口]
    applicable_when: "FAC-L3-EGRESS-MODE == next-hop"
    downstream_methods: [C-Combination]
    reuse_policy: must_reuse
    status: active

  - factor_id: FAC-L3-OUTIF-TYPE
    factor_name: 出接口接口类型
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-EGRESS
    domain_model: enum
    value_type: enum
    values: [tunnel, pppoe]
    display_values:
      tunnel: 隧道口
      pppoe: PPPoE接口
    aliases: [出接口类型, 策略路由出接口]
    applicable_when: "FAC-L3-EGRESS-MODE == out-interface"
    downstream_methods: [C-Combination]
    reuse_policy: must_reuse
    status: active

  - factor_id: FAC-L3-IF-CAPABILITY
    factor_name: 三层转发接口能力
    factor_kind: constraint
    design_role: constraint
    owner_object: OBJ-PR-EGRESS
    domain_model: enum
    value_type: enum
    values: [l3-capable, not-l3-capable]
    display_values:
      l3-capable: 支持三层转发
      not-l3-capable: 不支持三层转发
    aliases: [三层接口能力, 三层转发能力]
    applicable_when: "FAC-L3-NH-IF-TYPE or FAC-L3-OUTIF-TYPE selected"
    downstream_methods: [D-Data, C-Combination]
    reuse_policy: must_reuse
    status: active

  - factor_id: FAC-L3-REACHABILITY
    factor_name: 三层出口可达性
    factor_kind: state
    design_role: driver
    owner_object: OBJ-PR-EGRESS
    domain_model: state
    value_type: state
    values: [reachable, unreachable, recovered]
    display_values:
      reachable: 可达
      unreachable: 不可达
      recovered: 恢复
    aliases: [下一跳可达性, 出口可达状态, 链路可达性]
    applicable_when: "forwarding validation or failover validation"
    downstream_methods: [S-State, P-Parameter]
    reuse_policy: must_reuse
    status: active

  - factor_id: FAC-L3-FAIL-DETECT-METHOD
    factor_name: 失效检测方式
    factor_kind: condition
    design_role: driver
    owner_object: OBJ-PR-EGRESS
    domain_model: enum
    value_type: enum
    values: [ip-link, interface-down]
    display_values:
      ip-link: IP-LINK
      interface-down: 接口Down
    aliases: [故障检测方式, 下一跳失效检测方式]
    applicable_when: "FAC-L3-REACHABILITY == unreachable"
    downstream_methods: [P-Parameter, S-State]
    reuse_policy: must_reuse
    status: active

  - factor_id: FAC-L3-EXPECTED-FWD-PATH
    factor_name: 预期转发路径
    factor_kind: oracle
    design_role: oracle
    owner_object: OBJ-PR-EGRESS
    domain_model: enum
    value_type: enum
    values: [policy-next-hop, policy-out-interface, fallback-route, forward-fail]
    display_values:
      policy-next-hop: 按策略路由下一跳转发
      policy-out-interface: 按策略路由出接口转发
      fallback-route: 按静态/默认路由兜底转发
      forward-fail: 转发失败或丢弃
    aliases: [预期出口, 预期路径, 转发结果]
    applicable_when: "forwarding validation"
    downstream_methods: [oracle-design]
    reuse_policy: must_reuse
    status: active

  - factor_id: FAC-L3-NH-WEIGHT
    factor_name: 下一跳权重
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-EGRESS
    domain_model: range
    value_type: integer
    domain_expr: "int[1,255]"
    aliases: [权重, 多下一跳权重, 负载权重]
    applicable_when: "FAC-L3-EGRESS-MODE == next-hop"
    downstream_methods: [D-Data, C-Combination]
    reuse_policy: must_reuse
    status: active
    sample_definitions:
      - sample_id: WEIGHT_MIN
        sample_class: boundary_min
        expr: "min"
        materialized_value: 1
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: WEIGHT_MAX
        sample_class: boundary_max
        expr: "max"
        materialized_value: 255
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: WEIGHT_NOMINAL
        sample_class: in_range_nominal
        expr: "random_int(2,254,seed=case_id)"
        materialization: deterministic
        applicability:
          config_test: accepted
          function_test: preferred_precondition
      - sample_id: WEIGHT_BELOW_MIN
        sample_class: below_min
        expr: "min - 1"
        materialized_value: 0
        applicability:
          config_test: rejected
          function_test: not_applicable
      - sample_id: WEIGHT_ABOVE_MAX
        sample_class: above_max
        expr: "max + 1"
        materialized_value: 256
        applicability:
          config_test: rejected
          function_test: not_applicable
    usage_profiles:
      config_test:
        accepted_config_samples: [WEIGHT_MIN, WEIGHT_MAX, WEIGHT_NOMINAL]
        rejected_config_samples: [WEIGHT_BELOW_MIN, WEIGHT_ABOVE_MAX]
      function_test:
        precondition_samples: [WEIGHT_NOMINAL]

  - factor_id: FAC-CONFIG-NAME
    factor_name: 配置对象名称
    factor_kind: data
    design_role: driver
    owner_object: OBJ-GENERIC-CONFIG
    domain_model: string_pattern
    value_type: string
    domain_expr:
      length: "1..31"
      charset: [uppercase_letter, lowercase_letter, digit, chinese, hyphen, dot]
      regex: "^[A-Za-z0-9\\u4e00-\\u9fa5\\-.]{1,31}$"
    aliases: [名称, 对象名称, 规则名称, 配置名称]
    applicable_when: always
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: active
    sample_definitions:
      - sample_id: NAME_MIN_LEN
        sample_class: min_length
        expr: "string(charset=allowed,length=1)"
        materialized_value: "A"
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: NAME_MAX_LEN
        sample_class: max_length
        expr: "string(charset=allowed,length=31)"
        materialization: deterministic
        applicability:
          config_test: accepted
          function_test: not_preferred
      - sample_id: NAME_MIXED_CHARSET
        sample_class: charset_mixed
        expr: "string(include=[upper,lower,digit,chinese,hyphen,dot],length=12..20,seed=case_id)"
        materialized_value: "Ab9-策略.route"
        applicability:
          config_test: accepted
          function_test: preferred_precondition
      - sample_id: NAME_EMPTY
        sample_class: below_min_length
        expr: "string(length=0)"
        materialized_value: ""
        applicability:
          config_test: rejected
          function_test: not_applicable
      - sample_id: NAME_TOO_LONG
        sample_class: above_max_length
        expr: "string(charset=allowed,length=32)"
        materialization: deterministic
        applicability:
          config_test: rejected
          function_test: not_applicable
      - sample_id: NAME_INVALID_CHAR
        sample_class: invalid_charset
        expr: "string(include=['@'],length=8)"
        materialized_value: "name@001"
        applicability:
          config_test: rejected
          function_test: not_applicable
    usage_profiles:
      config_test:
        accepted_config_samples: [NAME_MIN_LEN, NAME_MAX_LEN, NAME_MIXED_CHARSET]
        rejected_config_samples: [NAME_EMPTY, NAME_TOO_LONG, NAME_INVALID_CHAR]
      function_test:
        precondition_samples: [NAME_MIXED_CHARSET]

  - factor_id: FAC-PR-RULE-SRC-IP
    factor_name: 策略路由规则源IPv4配置
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: ip_address
    value_type: string
    aliases: [源IP配置, 源地址配置, 规则源地址]
    applicable_when: "policy route rule source address configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: active
    sample_definitions:
      - sample_id: RULE_SRC_IP_VALID_HOST
        sample_class: valid_config
        expr: "valid_ipv4_host()"
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_SRC_IP_VALID_SUBNET
        sample_class: valid_config
        expr: "valid_ipv4_subnet()"
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_SRC_IP_INVALID
        sample_class: invalid_config
        expr: "invalid_ipv4()"
        applicability:
          config_test: rejected
          function_test: not_applicable
    usage_profiles:
      config_test:
        accepted_config_samples: [RULE_SRC_IP_VALID_HOST, RULE_SRC_IP_VALID_SUBNET]
        rejected_config_samples: [RULE_SRC_IP_INVALID]
      function_test:
        precondition_samples: [RULE_SRC_IP_VALID_HOST, RULE_SRC_IP_VALID_SUBNET]

  - factor_id: FAC-PR-RULE-DST-IP
    factor_name: 策略路由规则目的IPv4配置
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: ip_address
    value_type: string
    aliases: [目的IP配置, 目的地址配置, 规则目的地址]
    applicable_when: "policy route rule destination address configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: active
    sample_definitions:
      - sample_id: RULE_DST_IP_VALID_HOST
        sample_class: valid_config
        expr: "valid_ipv4_host()"
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_DST_IP_VALID_SUBNET
        sample_class: valid_config
        expr: "valid_ipv4_subnet()"
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_DST_IP_INVALID
        sample_class: invalid_config
        expr: "invalid_ipv4()"
        applicability:
          config_test: rejected
          function_test: not_applicable
    usage_profiles:
      config_test:
        accepted_config_samples: [RULE_DST_IP_VALID_HOST, RULE_DST_IP_VALID_SUBNET]
        rejected_config_samples: [RULE_DST_IP_INVALID]
      function_test:
        precondition_samples: [RULE_DST_IP_VALID_HOST, RULE_DST_IP_VALID_SUBNET]

  - factor_id: FAC-PR-RULE-PROTOCOL
    factor_name: 策略路由规则服务协议配置
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: enum
    value_type: enum
    values: [ip, tcp, udp, icmp, application]
    aliases: [协议配置, 服务协议配置, 规则协议]
    applicable_when: "policy route rule service configured"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: active
    sample_definitions:
      - sample_id: RULE_PROTOCOL_IP
        sample_class: valid_config
        materialized_value: ip
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_PROTOCOL_TCP
        sample_class: valid_config
        materialized_value: tcp
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_PROTOCOL_UDP
        sample_class: valid_config
        materialized_value: udp
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_PROTOCOL_INVALID
        sample_class: invalid_config
        expr: "not_in(values)"
        applicability:
          config_test: rejected
          function_test: not_applicable
    usage_profiles:
      config_test:
        accepted_config_samples: [RULE_PROTOCOL_IP, RULE_PROTOCOL_TCP, RULE_PROTOCOL_UDP]
        rejected_config_samples: [RULE_PROTOCOL_INVALID]
      function_test:
        precondition_samples: [RULE_PROTOCOL_IP, RULE_PROTOCOL_TCP, RULE_PROTOCOL_UDP]

  - factor_id: FAC-PR-RULE-SRC-PORT
    factor_name: 策略路由规则源端口配置
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: range
    value_type: integer
    domain_expr: "int[1,65535]"
    aliases: [源端口配置, 规则源端口]
    applicable_when: "FAC-PR-RULE-PROTOCOL in [tcp, udp]"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: active
    sample_definitions:
      - sample_id: RULE_SRC_PORT_MIN
        sample_class: boundary_min
        materialized_value: 1
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_SRC_PORT_MAX
        sample_class: boundary_max
        materialized_value: 65535
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_SRC_PORT_NOMINAL
        sample_class: in_range_nominal
        expr: "random_int(2,65534,seed=case_id)"
        applicability:
          config_test: accepted
          function_test: preferred_precondition
      - sample_id: RULE_SRC_PORT_BELOW_MIN
        sample_class: below_min
        materialized_value: 0
        applicability:
          config_test: rejected
          function_test: not_applicable
      - sample_id: RULE_SRC_PORT_ABOVE_MAX
        sample_class: above_max
        materialized_value: 65536
        applicability:
          config_test: rejected
          function_test: not_applicable
    usage_profiles:
      config_test:
        accepted_config_samples: [RULE_SRC_PORT_MIN, RULE_SRC_PORT_MAX, RULE_SRC_PORT_NOMINAL]
        rejected_config_samples: [RULE_SRC_PORT_BELOW_MIN, RULE_SRC_PORT_ABOVE_MAX]
      function_test:
        precondition_samples: [RULE_SRC_PORT_NOMINAL]

  - factor_id: FAC-PR-RULE-DST-PORT
    factor_name: 策略路由规则目的端口配置
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-RULE
    domain_model: range
    value_type: integer
    domain_expr: "int[1,65535]"
    aliases: [目的端口配置, 规则目的端口]
    applicable_when: "FAC-PR-RULE-PROTOCOL in [tcp, udp]"
    downstream_methods: [D-Data]
    reuse_policy: must_reuse
    status: active
    sample_definitions:
      - sample_id: RULE_DST_PORT_MIN
        sample_class: boundary_min
        materialized_value: 1
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_DST_PORT_MAX
        sample_class: boundary_max
        materialized_value: 65535
        applicability:
          config_test: accepted
          function_test: precondition
      - sample_id: RULE_DST_PORT_NOMINAL
        sample_class: in_range_nominal
        expr: "random_int(2,65534,seed=case_id)"
        applicability:
          config_test: accepted
          function_test: preferred_precondition
      - sample_id: RULE_DST_PORT_BELOW_MIN
        sample_class: below_min
        materialized_value: 0
        applicability:
          config_test: rejected
          function_test: not_applicable
      - sample_id: RULE_DST_PORT_ABOVE_MAX
        sample_class: above_max
        materialized_value: 65536
        applicability:
          config_test: rejected
          function_test: not_applicable
    usage_profiles:
      config_test:
        accepted_config_samples: [RULE_DST_PORT_MIN, RULE_DST_PORT_MAX, RULE_DST_PORT_NOMINAL]
        rejected_config_samples: [RULE_DST_PORT_BELOW_MIN, RULE_DST_PORT_ABOVE_MAX]
      function_test:
        precondition_samples: [RULE_DST_PORT_NOMINAL]

  - factor_id: FAC-TRAFFIC-LAYER-TYPE
    factor_name: 流量层级类型
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    values: [l2-non-ip, ip, tcp, udp, application]
    display_values:
      l2-non-ip: 二层非IP流
      ip: IP流
      tcp: TCP流
      udp: UDP流
      application: 应用流
    aliases: [业务流类型, 流量类型, 报文类型]
    downstream_methods: [C-Combination]
    status: active

  - factor_id: FAC-TRAFFIC-IP-MATCH
    factor_name: IP匹配状态
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    values: [src-dst-match, src-ip-mismatch, dst-ip-mismatch, both-ip-mismatch]
    display_values:
      src-dst-match: 源IP和目的IP均匹配
      src-ip-mismatch: 源IP不匹配
      dst-ip-mismatch: 目的IP不匹配
      both-ip-mismatch: 源IP和目的IP均不匹配
    aliases: [IP匹配, 源目的IP匹配, 地址匹配状态]
    downstream_methods: [P-Parameter, C-Combination]
    status: active

  - factor_id: FAC-TRAFFIC-SERVICE-MATCH
    factor_name: 服务匹配状态
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    values: [service-match, service-type-mismatch, src-port-mismatch, dst-port-mismatch]
    display_values:
      service-match: 服务类型和端口均匹配
      service-type-mismatch: 服务类型不匹配
      src-port-mismatch: 源端口不匹配
      dst-port-mismatch: 目的端口不匹配
    aliases: [服务匹配, 端口匹配, 协议端口匹配]
    downstream_methods: [P-Parameter, C-Combination]
    status: active

  - factor_id: FAC-TRAFFIC-APP-MATCH
    factor_name: 应用匹配状态
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    values: [ftp-match, http-match, other-app-match, app-mismatch, app-unrecognized]
    display_values:
      ftp-match: FTP流
      http-match: HTTP流
      other-app-match: 其他应用流
      app-mismatch: 应用不匹配
      app-unrecognized: 应用未识别
    aliases: [应用匹配, 应用识别, 应用流]
    downstream_methods: [P-Parameter, C-Combination]
    status: active

  - factor_id: FAC-EXPECTED-MATCH-RESULT
    factor_name: 预期命中结果
    factor_kind: oracle
    design_role: oracle
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    values: [hit, miss]
    display_values:
      hit: 命中
      miss: 不命中
    aliases: [命中结果, 预期匹配结果, 是否命中]
    downstream_methods: [oracle-design]
    status: active

  - factor_id: FAC-PKT-SRC-IP
    factor_name: 报文源IPv4
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: ip_address
    value_type: string
    aliases: [源IP, 源地址, 报文源地址]
    downstream_methods: [P-Parameter, C-Combination]
    sample_definitions:
      - sample_id: SRC_IP_MATCH
        sample_class: positive_function
        expr: "from_rule.src_ip.valid_member"
        applicability:
          config_test: not_applicable
          function_test: positive
      - sample_id: SRC_IP_MISMATCH
        sample_class: negative_function
        expr: "not_in(rule.src_ip)"
        applicability:
          config_test: not_applicable
          function_test: negative
    usage_profiles:
      config_test:
        policy: not_applicable
      function_test:
        positive_samples: [SRC_IP_MATCH]
        negative_samples: [SRC_IP_MISMATCH]
    status: active

  - factor_id: FAC-PKT-DST-IP
    factor_name: 报文目的IPv4
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: ip_address
    value_type: string
    aliases: [目的IP, 目的地址, 报文目的地址]
    downstream_methods: [P-Parameter, C-Combination]
    sample_definitions:
      - sample_id: DST_IP_MATCH
        sample_class: positive_function
        expr: "from_rule.dst_ip.valid_member"
        applicability:
          config_test: not_applicable
          function_test: positive
      - sample_id: DST_IP_MISMATCH
        sample_class: negative_function
        expr: "not_in(rule.dst_ip)"
        applicability:
          config_test: not_applicable
          function_test: negative
    usage_profiles:
      config_test:
        policy: not_applicable
      function_test:
        positive_samples: [DST_IP_MATCH]
        negative_samples: [DST_IP_MISMATCH]
    status: active

  - factor_id: FAC-PKT-PROTOCOL
    factor_name: 报文协议
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: enum
    value_type: enum
    values: [ip, tcp, udp, icmp, ftp, http, other-app]
    aliases: [协议, 服务类型, 应用协议]
    status: active

  - factor_id: FAC-PKT-SRC-PORT
    factor_name: 报文源端口
    factor_kind: data
    design_role: driver
    owner_object: OBJ-PR-TRAFFIC
    domain_model: range
    value_type: integer
    domain_expr: "int[1,65535]"
    downstream_methods: [P-Parameter, C-Combination]
    sample_definitions:
      - sample_id: SRC_PORT_MATCH
        sample_class: positive_function
        expr: "from_rule.service.src_port.valid_member"
        applicability:
          config_test: not_applicable
          function_test: positive
      - sample_id: SRC_PORT_MISMATCH
        sample_class: negative_function
        expr: "not_in(rule.service.src_port)"
        applicability:
          config_test: not_applicable
