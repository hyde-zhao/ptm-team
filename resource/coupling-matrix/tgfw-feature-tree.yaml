- level1: 网络特性
  level2: 二层交换
  level3: 二层转发
  level4: vlan转发
  level5: null
  definition: '1、1d网桥转发，采用SVL方式学习MAC地址。在转发过程中屏蔽报文的VLAN字段，MAC学习和转发都不会使用VLAN字段（不同VLAN间的业务是可以互通的，NGFW不支持1d网桥）。

    2、1q网桥转发，通常采用IVL方式学习MAC地址，MAC地址学习为Vid+SMAC，报文转发时也会使用VLAN_ID+DMAC查找MAC地址进行转发，且不同VLAN之间的业务时不能互通的。

    3、L2接入L3：在网桥中接入的报文DMAC匹配网桥接口的MAC地址时可以接入L3实现路由转发'
  name_en: Vlan
  feature_id: '1211'
  version_change: null
  risk_level: null
  priority: null
