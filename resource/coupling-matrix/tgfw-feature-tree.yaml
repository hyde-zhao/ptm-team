- level1: 网络特性
  level2: 接口
  level3: 聚合接口
  level4: null
  level5: null
  definition: '随着网络中部署的业务量不断增长，对于全双工点对点链路，单条物理链路的带宽已不能满足正常的业务流量需求。

    如果将当前接口板替换为具备更高带宽的接口板，则会浪费现有的设备资源，而且升级代价较大。如果增加设备间的链路数量，则在作为三层口使用时需要在每个接口上配置IP地址，从而导致浪费IP地址资源。

    此时，可以把多个独立的物理接口绑定在一起作为一个大带宽的逻辑接口使用，即Eth-Trunk接口，既不用替换接口板也不会浪费IP地址资源。'
  name_en: Trunk
  feature_id: '114'
  version_change: null
  risk_level: null
  priority: 3
