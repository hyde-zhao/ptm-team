- level1: 高可靠性
  level2: 服务质量
  level3: IPv4带宽管理
  level4: null
  level5: null
  definition: '务质量QoS（Quality of Service）是针对各种业务的不同需求，为其提供端到端的服务质量保证。QoS不会增加网络带宽，它是有效利用现有网络资源的工具，允许不同的流量不平等的竞争网络资源，语音、视频和重要的数据应用在网络设备中可以优先得到服务。

    随着网络技术的飞速发展，互联网中的业务越来越多样化。除了传统的WWW、E-Mail、FTP应用外，用户还尝试在Internet上拓展新业务，比如IP电话、电子商务、多媒体游戏、远程教学、远程医疗、可视电话、电视会议、视频点播、在线电影等。企业用户也希望通过VPN技术，将分布在各地的分支机构连接起来，开展一些事务性应用，比如访问公司的数据库或通过Telnet管理远程设备。'
  name_en: IPv4BwMng
