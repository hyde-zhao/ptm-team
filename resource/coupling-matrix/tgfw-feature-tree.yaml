  definition: '接口对，即一进一出两个接口。将两个同类型接口组成接口对后，从一个接口进入的流量固定从另一个接口转发出去，不需要查询路由表或MAC地址表。如果进、出接口配置为同一个接口，则从该接口进入的报文经过设备处理后仍然从该接口转发出去。

    在该场景下防火墙能完成安全相关的处理，但是用户感觉不到防火墙的存在'
