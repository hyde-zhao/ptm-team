- level1: 高可靠性
  level2: null
  level3: null
  level4: null
  level5: null
  definition: '可靠性是降低网络中断时间、保证网络中业务质量，提升用户体验的一项技术。

    可靠性技术是实现高可靠性的一系列技术。它主要涉及到系统及硬件可靠性设计方法、软件可靠性设计方法、可靠性测试验证方法和IP网络可靠性设计。

    随着网络的快速普及和应用的日益深入，各种增值业务在网络上得到了广泛部署，网络带宽也以指数级增长，网络短时间的中断就可能影响大量业务，造成重大损失。

    作为业务承载主体的基础网络，其可靠性也因此成为日益关注的焦点。

    本文关注的是NE40E上实现的IP网络可靠性技术'
  name_en: HiRel
  feature_id: '2'
  version_change: null
  risk_level: null
  priority: null
- level1: 高可靠性
  level2: 高可用
  level3: null
  level4: null
  level5: null
  definition: 可用性（High Availability，简称HA）能够在通信线路或设备发生故障时提供备用方案，防止由于单个产品故障或链路故障导致网络中断，保证网络服务的连续性。实现HA功能需要部署两台同一型号的设备，并且选择同样的接口作为HA接口。两台设备之间通过HA接口直连，当一台设备不可用时，用户请求会被及时转发到另外一台设备上处理，网络通信不会中断。
  name_en: HA
  feature_id: '21'
  version_change: null
  risk_level: null
  priority: null
